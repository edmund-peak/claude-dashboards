    const toPlace = nd.rptCells.filter(c => c.assignedStorage && c.storageSlot == null);
    const dayMin = {};
    toPlace.forEach(c => { const d = dayOf(c), n = cellNum(c.cellId); if (!dayMin[d] || n[0] < dayMin[d][0] || (n[0] === dayMin[d][0] && n[1] < dayMin[d][1])) dayMin[d] = n; });
    const cmp = (a, b) => a[0] - b[0] || a[1] - b[1];
    toPlace.sort((a, b) => cmp(dayMin[dayOf(a)], dayMin[dayOf(b)]) || cmp(cellNum(a.cellId), cellNum(b.cellId)));
    toPlace.forEach(c => {
      const shelves = shelvesOf(c.assignedStorage, sc);
      const s = occ[c.assignedStorage] = occ[c.assignedStorage] || new Set();
      for (let sh = 0; sh < shelves.length; sh++)
        for (let sl = 0; sl < shelves[sh].cap; sl++) {
          const k = sh + ":" + sl;
          if (!s.has(k)) { c.storageShelf = sh; c.storageSlot = sl; s.add(k); return; }
        }
      // shelves full → leave unplaced (shows in the Unplaced tray)
    });
    packedRef.current = true;
    persist(nd);
  }, [data, persist]);

  const selected = selectedIdx != null ? (data.rptCells || [])[selectedIdx] : null;

  // Confirm a cell came back to storage on `dateStr` — closes its open RPT
  // event; the server then schedules the next RPT (return + rest days).
  const handleReturn = async (rptIdx, dateStr) => {
    const nd = JSON.parse(JSON.stringify(data));
    const cell = nd.rptCells[rptIdx];
    const evs = cell.events || (cell.events = []);
    const last = evs[evs.length - 1];
    if (last && !last.returned) last.returned = dateStr;
    cell.running = false;
    cell.nextRptStart = addDays(dateStr, (nd.rptSettings?.restDays) || 28);
    await persist(nd);
  };

  // Move a cell to the Archive: stash its per-cycle RPT history so it's not
  // lost, drop it from the planner, and remember the id so the watcher won't
  // recreate it from lingering files.
  const handleRemove = async (rptIdx) => {
    const nd = JSON.parse(JSON.stringify(data));
    const cell = nd.rptCells[rptIdx];
    if (!cell) return;
    nd.removedCells = nd.removedCells || [];
    if (cell.cellId && !nd.removedCells.includes(cell.cellId)) nd.removedCells.push(cell.cellId);
    if (cell.cellId) {
      nd.archivedCells = nd.archivedCells || {};
      nd.archivedCells[cell.cellId] = {
        events: cell.events || [],
        storageTemp: cell.storageTemp || null,
        rptType: cell.rptType || null,
        soc: cell.soc != null ? cell.soc : null,
        archivedOn: today(),
      };
    }
    nd.rptCells.splice(rptIdx, 1);
    setSelectedIdx(null);
    await persist(nd);
  };

  return (
    <div>
      {/* ── RPT Sub-Tab Selector ── */}
      <div style={{ display: "flex", gap: 4, marginBottom: 16 }}>
        {[["storage", "Storage"], ["gantt", "Channel Usage"]].map(([key, label]) => (
          <button key={key} onClick={() => setRptSubTab(key)} style={{
            padding: "7px 18px", borderRadius: 6, border: "1px solid " + (rptSubTab === key ? "#a78bfa" : "#2a303c"),
            background: rptSubTab === key ? "rgba(167,139,250,0.12)" : "transparent",
            color: rptSubTab === key ? "#a78bfa" : "#8891a0",
            cursor: "pointer", fontSize: 13, fontWeight: 600, fontFamily: "inherit"
          }}>{label}</button>
        ))}
      </div>

      {rptSubTab !== "gantt" && (
        <UpcomingRptAlert stats={stats} tempFilter={tempFilter} expanded={upcomingExpanded} setExpanded={setUpcomingExpanded} />
      )}

      {rptSubTab === "storage" && (
        <StorageView data={data} persist={persist} tempFilter={tempFilter}
          selectedIdx={selectedIdx} setSelectedIdx={setSelectedIdx} onAdd={onAdd}
          onReturn={handleReturn} onRemove={handleRemove} />
      )}
      {rptSubTab === "gantt" && (
        <ChannelUsageGantt data={data} persist={persist} tempFilter={tempFilter} />
      )}

      {selected && (
        <CellDetailDrawer data={data} rptIdx={selectedIdx}
          onClose={() => setSelectedIdx(null)} onRemove={handleRemove} />
      )}
    </div>
  );
}

// ═══════════════════════════════════════════════════
// CHANNEL USAGE GANTT
// ═══════════════════════════════════════════════════
function ChannelUsageGantt({ data, persist, tempFilter }) {
  const [selectedBlocks, setSelectedBlocks] = React.useState(new Set()); // set of "cellId|start|rptNumber"
  const [dragState, setDragState] = React.useState(null);
  const [pendingMove, setPendingMove] = React.useState(null);
  const scrollRef = React.useCallback(node => { if (node && !node._scrolled) { node._scrolled = true; node.scrollLeft = PAST_DAYS * COL_W; } }, []);
  const detailRef = React.useCallback(node => { if (node) node.scrollIntoView({ behavior: "smooth", block: "nearest" }); }, [selectedBlocks]);

  const COL_W = 32;
  const ROW_H = 40;
  const LABEL_W = 130;
  const HEADER_H = 46;
  const PAST_DAYS = 90;
  const FUTURE_DAYS = 210;
  const TOTAL_DAYS = PAST_DAYS + FUTURE_DAYS;
  const MAX_PROJECTIONS = 12; // how many future RPTs to project (bounded by viewEnd anyway)

  const blockKey = (b) => `${b.cellId}|${b.start}|${b.rptNumber}`;

  const ganttData = React.useMemo(() => {
    const rptDur = data.rptSettings?.durationDays || 4;
    const restDays = data.rptSettings?.restDays || 28;
    const todayStr = today();
    const viewStart = addDays(todayStr, -PAST_DAYS);
    const viewEnd = addDays(todayStr, FUTURE_DAYS);

    const dates = [];
    for (let i = 0; i < TOTAL_DAYS; i++) {
      const d = addDays(viewStart, i);
      const dt = new Date(d + "T00:00:00");
      const dow = dt.getDay();
      dates.push({ date: d, dow, isWeekend: dow === 0 || dow === 6, isToday: d === todayStr, label: dt.toLocaleDateString("en-US", { month: "short", day: "numeric" }), dayLabel: ["Su","Mo","Tu","We","Th","Fr","Sa"][dow] });
    }

    const ch9 = data.chambers.find(c => c.name === "Chamber_9");
    const channels = ch9 ? ch9.channels.map(ch => ({
      number: ch.number, channelId: ch.channelId, purpose: ch.purpose,
      label: `Chamber_9-${String(ch.number).padStart(2, "0")}`
    })) : [];

    // A cell's assignedChannel is the real Neware channel id (e.g.
    // "R05-T01-CH01"), but it may also be a legacy "Chamber_9-NN" label.
    // Resolve either form to its gantt row, and give any RPT cell on a
    // channel we don't know about its own row so nothing is hidden.
    const rowKeyByChannel = {};
    channels.forEach(ch => {
      rowKeyByChannel[ch.label] = ch.label;
      if (ch.channelId) rowKeyByChannel[ch.channelId] = ch.label;
    });
    (data.rptCells || []).forEach(rc => {
      const a = rc.assignedChannel;
      if (a && !rowKeyByChannel[a]) {
        rowKeyByChannel[a] = a;
        channels.push({ number: null, channelId: a, purpose: null, label: a });
      }
    });

    const cellsByChannel = {};
    (data.rptCells || []).forEach((rc, idx) => {
      const key = rowKeyByChannel[rc.assignedChannel];
      if (!key) return;
      if (tempFilter && tempFilter !== "all" && rc.storageTemp !== tempFilter) return;
      if (!cellsByChannel[key]) cellsByChannel[key] = [];
      cellsByChannel[key].push({ ...rc, _idx: idx });
    });

    const channelBlocks = {};
    const overlaps = [];
    const gaps = [];

    channels.forEach(ch => {
      const key = ch.label;
      const cells = cellsByChannel[key] || [];
      const blocks = [];

      cells.forEach(rc => {
        const socLabel = rc.soc != null ? (rc.soc * 100).toFixed(0) + "%" : "—";
        const tempLabel = rc.storageTemp || "—";

        const events = (rc.events || []).filter(ev => ev.start);
        events.forEach((ev, evIdx) => {
          const rptNumber = evIdx + 1;
          let evStart = ev.start;
          let evEnd = ev.returned || addDays(ev.start, rptDur);

          const isPast = evStart < todayStr;
          const isCurrent = evStart <= todayStr && evEnd > todayStr;

          if (evEnd < viewStart || evStart >= viewEnd) return;

          const type = isPast ? "completed" : "planned";
          blocks.push({
            cellId: rc.cellId, start: evStart, end: evEnd, testEnd: evEnd,
            type, projected: false,
            rptNumber, soc: rc.soc, storageTemp: rc.storageTemp,
            assignedStorage: rc.assignedStorage,
            onTest: isCurrent, _rptIdx: rc._idx,
            monthLabel: (rptNumber - 1) + "M", socLabel, tempLabel,
            channel: key,
          });
        });

        // Project forward from the last real run (revised off its return date)
        // and keep the same cadence going to fill the view window.
        const sortedEvts = [...events].sort((a, b) => a.start.localeCompare(b.start));
        const lastEvt = sortedEvts[sortedEvts.length - 1];
        if (lastEvt) {
          const lastEnd = lastEvt.returned || addDays(lastEvt.start, rptDur);
          let projStart = addDays(lastEnd, restDays);
          let projNum = sortedEvts.length + 1;
          let projCount = 0;
          while (projStart < viewEnd && projCount < MAX_PROJECTIONS) {
            const projEnd = addDays(projStart, rptDur);
            if (projEnd >= viewStart) {
              blocks.push({
                cellId: rc.cellId, start: projStart, end: projEnd, testEnd: projEnd,
                type: "planned", projected: true,
                rptNumber: projNum, soc: rc.soc, storageTemp: rc.storageTemp,
                assignedStorage: rc.assignedStorage,
                _rptIdx: rc._idx,
                monthLabel: (projNum - 1) + "M", socLabel, tempLabel, channel: key,
              });
            }
            projStart = addDays(projEnd, restDays);
            projNum++;
            projCount++;
          }
        } else if (rc.nextRptStart) {
          const es = rc.nextRptStart;
          const ee = addDays(es, rptDur);
          if (ee >= viewStart && es < viewEnd) {
            blocks.push({
              cellId: rc.cellId, start: es, end: ee, testEnd: ee,
              type: "planned", projected: false,
              rptNumber: 1, soc: rc.soc, storageTemp: rc.storageTemp,
              assignedStorage: rc.assignedStorage,
              _rptIdx: rc._idx,
              monthLabel: "0M", socLabel, tempLabel, channel: key,
            });
            let projStart = addDays(ee, restDays);
            let projNum = 2;
            let projCount = 0;
            while (projStart < viewEnd && projCount < MAX_PROJECTIONS) {
              const pEnd = addDays(projStart, rptDur);
              blocks.push({
                cellId: rc.cellId, start: projStart, end: pEnd, testEnd: pEnd,
                type: "planned", projected: true,
                rptNumber: projNum, soc: rc.soc, storageTemp: rc.storageTemp,
                assignedStorage: rc.assignedStorage,
                _rptIdx: rc._idx,
                monthLabel: (projNum - 1) + "M", socLabel, tempLabel, channel: key,
              });
              projStart = addDays(pEnd, restDays);
              projNum++;
              projCount++;
            }
          }
        }
      });

      blocks.sort((a, b) => a.start.localeCompare(b.start));

      for (let i = 0; i < blocks.length; i++) {
        for (let j = i + 1; j < blocks.length; j++) {
          if (blocks[i].cellId === blocks[j].cellId) continue;
          if (blocks[j].start < blocks[i].end && blocks[j].end > blocks[i].start) {
            blocks[i].hasOverlap = true;
            blocks[j].hasOverlap = true;
            if (!blocks[i].overlapWith) blocks[i].overlapWith = [];
            if (!blocks[j].overlapWith) blocks[j].overlapWith = [];
            if (!blocks[i].overlapWith.includes(blocks[j].cellId)) blocks[i].overlapWith.push(blocks[j].cellId);
            if (!blocks[j].overlapWith.includes(blocks[i].cellId)) blocks[j].overlapWith.push(blocks[i].cellId);
            if (!overlaps.find(o => o.channel === key && o.blockA === blocks[i].cellId && o.blockB === blocks[j].cellId && o.date === blocks[j].start)) {
              overlaps.push({ channel: key, blockA: blocks[i].cellId, blockB: blocks[j].cellId, date: blocks[j].start, dateEnd: blocks[i].end });
            }
          }
        }
      }

      const busyDays = new Set();
      blocks.forEach(b => { let d = b.start; while (d < b.end) { busyDays.add(d); d = addDays(d, 1); } });
      let gapStart = null, gapWeekdays = 0;
      for (let i = 0; i < FUTURE_DAYS; i++) {
        const dStr = addDays(todayStr, i);
        const dow = new Date(dStr + "T00:00:00").getDay();
        if (dow === 0 || dow === 6) continue;
        if (!busyDays.has(dStr)) { if (!gapStart) gapStart = dStr; gapWeekdays++; }
        else { if (gapStart && gapWeekdays >= rptDur) gaps.push({ channel: key, start: gapStart, weekdays: gapWeekdays }); gapStart = null; gapWeekdays = 0; }
      }
      if (gapStart && gapWeekdays >= rptDur) gaps.push({ channel: key, start: gapStart, weekdays: gapWeekdays });

      channelBlocks[key] = blocks;
    });

    return { dates, channels, channelBlocks, overlaps, gaps, viewStart, rptDur, restDays, todayStr };
  }, [data, tempFilter]);

  const { dates, channels, channelBlocks, overlaps, gaps, viewStart, rptDur, restDays, todayStr } = ganttData;

  // ── Selection + Drag state ──
  const dragRef = React.useRef(null); // {block, startX, startY, moved, currentOffset}

  const handleBlockClick = React.useCallback((e, b) => {
    // Only handle click if we didn't drag
    if (dragRef.current && dragRef.current.moved) return;
    const key = blockKey(b);
    if (e.shiftKey || e.ctrlKey || e.metaKey) {
      setSelectedBlocks(prev => {
        const next = new Set(prev);
        if (next.has(key)) next.delete(key); else next.add(key);
        return next;
      });
    } else {
      setSelectedBlocks(prev => prev.has(key) && prev.size === 1 ? new Set() : new Set([key]));
    }
  }, []);

  const getSelectedBlockObjects = React.useCallback(() => {
    const all = [];
    Object.values(channelBlocks).forEach(blocks => {
      blocks.forEach(b => { if (selectedBlocks.has(blockKey(b))) all.push(b); });
    });
    return all;
  }, [channelBlocks, selectedBlocks]);

  // ── Drag handler — moves all selected blocks ──
  const handlePointerDown = React.useCallback((e, block) => {
    if (block.type === "completed") return;
    const startX = e.clientX || (e.touches && e.touches[0].clientX);
    const startY = e.clientY || (e.touches && e.touches[0].clientY);
    const isMultiSelect = e.shiftKey || e.ctrlKey || e.metaKey;

    // Auto-select the dragged block if not already selected
    // But don't clobber existing selection if shift/ctrl held
    const bk = blockKey(block);
    if (!isMultiSelect && !selectedBlocks.has(bk)) {
      setSelectedBlocks(new Set([bk]));
    }

    dragRef.current = { block, startX, startY, moved: false, currentOffset: 0, isMultiSelect };
    setDragState({ block, startX, currentOffset: 0 });

    const handleMove = (ev) => {
      ev.preventDefault();
      const cx = ev.clientX || (ev.touches && ev.touches[0].clientX);
      const cy = ev.clientY || (ev.touches && ev.touches[0].clientY);
      const dx = cx - startX;
      const dy = cy - startY;
      // Only start "real" drag after 4px movement
      if (!dragRef.current.moved && (Math.abs(dx) > 4 || Math.abs(dy) > 4)) {
        dragRef.current.moved = true;
      }
      if (dragRef.current.moved) {
        const daysDelta = Math.round(dx / COL_W);
        dragRef.current.currentOffset = daysDelta;
        setDragState(prev => prev ? { ...prev, currentOffset: daysDelta } : null);
      }
    };

    const handleUp = () => {
      document.removeEventListener("mousemove", handleMove);
      document.removeEventListener("mouseup", handleUp);
      document.removeEventListener("touchmove", handleMove);
      document.removeEventListener("touchend", handleUp);

      if (dragRef.current && dragRef.current.moved && dragRef.current.currentOffset !== 0) {
        setPendingMove({ daysDelta: dragRef.current.currentOffset, triggerBlock: dragRef.current.block });
      }
      setDragState(null);
      // Don't clear dragRef.moved yet — onClick handler needs it
      setTimeout(() => { dragRef.current = null; }, 0);
    };

    document.addEventListener("mousemove", handleMove);
    document.addEventListener("mouseup", handleUp);
    document.addEventListener("touchmove", handleMove, { passive: false });
    document.addEventListener("touchend", handleUp);
  }, [selectedBlocks]);

  const pendingMoveInfo = React.useMemo(() => {
    if (!pendingMove) return null;
    const selBlocks = getSelectedBlockObjects().filter(b => b.type !== "completed");
    if (selBlocks.length === 0) return null;
    return {
      blocks: selBlocks,
      daysDelta: pendingMove.daysDelta,
      newStarts: selBlocks.map(b => ({ block: b, newStart: addDays(b.start, pendingMove.daysDelta) })),
    };
  }, [pendingMove, getSelectedBlockObjects]);

  // ── Confirm move — mutates rptCells events directly ──
  const handleConfirmMove = React.useCallback(async () => {
    if (!pendingMoveInfo || !persist) return;
    const { blocks: moveBlocks, daysDelta } = pendingMoveInfo;
    const nd = JSON.parse(JSON.stringify(data));

    moveBlocks.forEach(block => {
      const cell = nd.rptCells[block._rptIdx];
      if (!cell) return;

      if (block.projected) {
        if (cell.nextRptStart) {
          cell.nextRptStart = addDays(cell.nextRptStart, daysDelta);
        }
      } else {
        const events = cell.events || [];
        const matchIdx = events.findIndex(ev =>
          ev.start === block.start ||
          (block.originalStart && ev.start === block.originalStart)
        );
        if (matchIdx >= 0) {
          const ev = events[matchIdx];
          const newStart = addDays(ev.start, daysDelta);
          ev.start = newStart;
          if (ev.returned) {
            ev.returned = addDays(ev.returned, daysDelta);
          }
        } else if (cell.nextRptStart) {
          cell.nextRptStart = addDays(cell.nextRptStart, daysDelta);
        }
        // Recompute nextRptStart from last completed event
        const completedEvts = (cell.events || []).filter(e => e.returned);
        const onTestEvt = (cell.events || []).find(e => !e.returned);
        if (completedEvts.length > 0 && !onTestEvt) {
          const lastReturn = completedEvts.sort((a,b) => b.returned.localeCompare(a.returned))[0].returned;
          cell.nextRptStart = addDays(lastReturn, nd.rptSettings.restDays);
        }
      }
    });

    await persist(nd);
    setPendingMove(null);
    setSelectedBlocks(new Set());
  }, [pendingMoveInfo, data, persist]);

  const handleCancelMove = React.useCallback(() => setPendingMove(null), []);

  // ── Recommendations ──
  const recommendations = React.useMemo(() => {
    const recs = [];
    if (overlaps.length > 0) recs.push({ type: "error", text: `${overlaps.length} scheduling conflict${overlaps.length > 1 ? "s" : ""} detected — cells overlap on the same channel.` });
    const emptyChannels = channels.filter(ch => (channelBlocks[ch.label] || []).length === 0);
    if (emptyChannels.length > 0) recs.push({ type: "info", text: `${emptyChannels.length} channel${emptyChannels.length > 1 ? "s" : ""} completely open: ${emptyChannels.slice(0, 6).map(c => c.label).join(", ")}${emptyChannels.length > 6 ? "..." : ""}` });
    const sortedGaps = [...gaps].sort((a, b) => b.weekdays - a.weekdays).slice(0, 5);
    if (sortedGaps.length > 0 && emptyChannels.length < channels.length) {
      recs.push({ type: "success", text: `Best openings for new RPTs`, gapDetails: sortedGaps.map(g => ({ channel: g.channel, start: g.start, weekdays: g.weekdays })) });
    }
    return recs;
  }, [channels, channelBlocks, overlaps, gaps]);

  const firstSelected = React.useMemo(() => {
    const objs = getSelectedBlockObjects();
    return objs.length > 0 ? objs[0] : null;
  }, [getSelectedBlockObjects]);

  return (
    <div>
      {/* ── Pending Move Confirmation ── */}
      {pendingMoveInfo && (
        <div style={{ position: "fixed", top: 0, left: 0, right: 0, bottom: 0, background: "rgba(0,0,0,0.55)", zIndex: 300, display: "flex", alignItems: "center", justifyContent: "center", backdropFilter: "blur(3px)" }}>
          <div style={{ background: "#1c2129", border: "1px solid #fbbf24", borderRadius: 12, padding: 24, maxWidth: 520, width: "90%", maxHeight: "80vh", overflowY: "auto" }}>
            <div style={{ fontSize: 15, fontWeight: 700, color: "#fbbf24", marginBottom: 8 }}>⚡ Confirm Schedule Change</div>
            <div style={{ fontSize: 13, color: "#e2e6ed", marginBottom: 12, lineHeight: "20px" }}>
              Move <strong>{pendingMoveInfo.blocks.length}</strong> block{pendingMoveInfo.blocks.length !== 1 ? "s" : ""} by
              <strong style={{ color: pendingMoveInfo.daysDelta > 0 ? "#34d399" : "#f87171" }}> {pendingMoveInfo.daysDelta > 0 ? "+" : ""}{pendingMoveInfo.daysDelta} day{Math.abs(pendingMoveInfo.daysDelta) !== 1 ? "s" : ""}</strong>
            </div>
            <div style={{ display: "flex", flexDirection: "column", gap: 4, marginBottom: 16 }}>
              {pendingMoveInfo.newStarts.map(({ block: b, newStart }, i) => (
                <div key={i} style={{ fontSize: 12, color: "#8891a0", display: "flex", gap: 8, alignItems: "center" }}>
                  <span style={{ fontWeight: 600, color: tempBaseColor(b.storageTemp), minWidth: 120 }}>{b.cellId}</span>
                  <span style={{ color: "#64748b" }}>RPT #{b.rptNumber}</span>
                  <span>{fmtDate(b.start)} → <strong style={{ color: "#e2e6ed" }}>{fmtDate(newStart)}</strong></span>
                </div>
              ))}
            </div>
            <div style={{ fontSize: 12, color: "#8891a0", marginBottom: 16 }}>
              Changes will update event dates directly. Future projected RPTs will recalculate.
            </div>
            <div style={{ display: "flex", gap: 8 }}>
              <button onClick={handleConfirmMove} style={{ padding: "8px 20px", borderRadius: 6, border: "1px solid #fbbf24", background: "rgba(251,191,36,0.15)", color: "#fbbf24", cursor: "pointer", fontSize: 13, fontWeight: 600, fontFamily: "inherit" }}>Confirm Move</button>
              <button onClick={handleCancelMove} style={{ padding: "8px 20px", borderRadius: 6, border: "1px solid #2a303c", background: "transparent", color: "#8891a0", cursor: "pointer", fontSize: 13, fontFamily: "inherit" }}>Cancel</button>
            </div>
          </div>
        </div>
      )}

      {/* ── Summary Recommendations ── */}
      {recommendations.length > 0 && (
        <div style={{ marginBottom: 16, display: "flex", flexDirection: "column", gap: 6 }}>
          {recommendations.map((rec, i) => {
            const iconMap = { error: "⚠", warning: "⚡", info: "ℹ", success: "✓" };
            const colorMap = { error: "#f87171", warning: "#fbbf24", info: "#38bdf8", success: "#34d399" };
            if (rec.type === "success" && rec.gapDetails) {
              return (
                <div key={i} style={{ padding: "12px 16px", borderRadius: 8, background: "#34d39910", border: "1px solid #34d39940" }}>
                  <div style={{ display: "flex", alignItems: "center", gap: 8, marginBottom: 10 }}>
                    <span style={{ fontWeight: 700, fontSize: 14, color: "#34d399" }}>✓</span>
                    <span style={{ fontSize: 13, fontWeight: 600, color: "#34d399" }}>Best openings for new RPTs</span>
                  </div>
                  <div style={{ display: "grid", gridTemplateColumns: "repeat(auto-fill, minmax(200px, 1fr))", gap: 6 }}>
                    {rec.gapDetails.map((g, gi) => (
                      <div key={gi} style={{ padding: "8px 12px", borderRadius: 6, background: "#0c0f14", border: "1px solid #1e2530", display: "flex", flexDirection: "column", gap: 3 }}>
                        <div style={{ fontSize: 12, fontWeight: 600, color: "#e2e6ed", fontFamily: "'JetBrains Mono', monospace" }}>{g.channel}</div>
                        <div style={{ fontSize: 11, color: "#8891a0" }}>From <span style={{ color: "#34d399", fontWeight: 500 }}>{fmtDate(g.start)}</span></div>
                        <div style={{ fontSize: 11, color: "#64748b" }}>{g.weekdays} weekdays open</div>
                      </div>
                    ))}
                  </div>
                </div>
              );
            }
            return (
              <div key={i} style={{ padding: "10px 14px", borderRadius: 6, background: colorMap[rec.type] + "0d", border: "1px solid " + colorMap[rec.type] + "40", fontSize: 12, color: colorMap[rec.type], display: "flex", alignItems: "flex-start", gap: 8 }}>
                <span style={{ fontWeight: 700, fontSize: 14, lineHeight: "16px", flexShrink: 0 }}>{iconMap[rec.type]}</span>
                <span style={{ lineHeight: "16px" }}>{rec.text}</span>
              </div>
            );
          })}
        </div>
      )}

      {/* ── Legend + selection info ── */}
      <div style={{ display: "flex", gap: 14, alignItems: "center", marginBottom: 12, flexWrap: "wrap" }}>
        <span style={{ fontSize: 11, color: "#64748b", fontWeight: 600, textTransform: "uppercase", letterSpacing: "0.4px" }}>Temp:</span>
        {[["25°C", blockColor("25°C", 0.5)], ["45°C", blockColor("45°C", 0.5)], ["60°C", blockColor("60°C", 0.5)], ["70°C", blockColor("70°C", 0.5)]].map(([label, c]) => (
          <div key={label} style={{ display: "flex", alignItems: "center", gap: 4, fontSize: 11, color: "#8891a0" }}>
            <div style={{ width: 16, height: 10, borderRadius: 2, background: c }} />{label}
          </div>
        ))}
        <span style={{ fontSize: 11, color: "#64748b", fontWeight: 600, textTransform: "uppercase", letterSpacing: "0.4px", marginLeft: 4 }}>SOC:</span>
        <div style={{ display: "flex", alignItems: "center", gap: 4, fontSize: 11, color: "#8891a0" }}>
          <div style={{ width: 48, height: 10, borderRadius: 2, background: `linear-gradient(90deg, ${blockColor("25°C", 0)}, ${blockColor("25°C", 1)})` }} />
          <span>0%→100%</span>
        </div>
        <span style={{ color: "#2a303c" }}>│</span>
        {[["Completed", 0.7], ["Planned", 0.85]].map(([label, op]) => (
          <div key={label} style={{ display: "flex", alignItems: "center", gap: 4, fontSize: 11, color: "#8891a0" }}>
            <div style={{ width: 16, height: 10, borderRadius: 2, background: blockColor("60°C", 0.5), opacity: op }} />{label}
          </div>
        ))}
        <div style={{ display: "flex", alignItems: "center", gap: 4, fontSize: 11, color: "#8891a0" }}>
          <div style={{ width: 16, height: 10, borderRadius: 2, background: "repeating-linear-gradient(45deg, #f87171, #f87171 2px, transparent 2px, transparent 4px)" }} />Conflict
        </div>
        <div style={{ display: "flex", alignItems: "center", gap: 4, fontSize: 11, color: "#8891a0" }}>
          <span style={{ fontSize: 10 }}>↔</span>Drag · Shift+click multi
        </div>
        {selectedBlocks.size > 1 && (
          <span style={{ fontSize: 11, fontWeight: 600, color: "#a78bfa", marginLeft: 4 }}>
            {selectedBlocks.size} selected — drag any to move all
          </span>
        )}
        {selectedBlocks.size > 0 && (
          <button onClick={() => setSelectedBlocks(new Set())} style={{ padding: "2px 8px", borderRadius: 4, border: "1px solid #2a303c", background: "transparent", color: "#64748b", cursor: "pointer", fontSize: 10, fontFamily: "inherit" }}>Clear</button>
        )}
      </div>

      {/* ── Gantt Chart ── */}
      <div style={{ border: "1px solid #2a303c", borderRadius: 8, overflow: "hidden", background: "#151920" }}>
        <div ref={scrollRef} className="rpt-scroll" style={{ overflowX: "auto", overflowY: "auto", maxHeight: "calc(100vh - 400px)" }}>
          <div style={{ display: "inline-block", minWidth: LABEL_W + TOTAL_DAYS * COL_W + 2 }}>
            {/* Header */}
            <div style={{ display: "flex", position: "sticky", top: 0, zIndex: 10, background: "#151920", borderBottom: "1px solid #2a303c" }}>
              <div style={{ width: LABEL_W, minWidth: LABEL_W, flexShrink: 0, padding: "4px 8px", display: "flex", alignItems: "flex-end", fontSize: 10, fontWeight: 700, color: "#64748b", textTransform: "uppercase", borderRight: "1px solid #2a303c", height: HEADER_H }}>Channel</div>
              <div style={{ display: "flex" }}>
                {dates.map((d, di) => {
                  const showMonth = di === 0 || dates[di-1]?.label.split(" ")[0] !== d.label.split(" ")[0];
                  return (
                    <div key={di} style={{ width: COL_W, minWidth: COL_W, textAlign: "center", borderLeft: d.dow === 1 ? "1px solid #2a303c" : "none", background: d.isToday ? "rgba(78,154,245,0.15)" : d.isWeekend ? "#1a1e27" : "transparent", display: "flex", flexDirection: "column", justifyContent: "flex-end", padding: "2px 0 3px" }}>
                      {showMonth && <div style={{ fontSize: 9, fontWeight: 700, color: "#4e9af5", lineHeight: "12px" }}>{d.label.split(" ")[0]}</div>}
                      <div style={{ fontSize: 10, fontWeight: 600, color: d.isToday ? "#4e9af5" : d.isWeekend ? "#3a4250" : "#8891a0", lineHeight: "14px" }}>{d.label.split(" ")[1]}</div>
                      <div style={{ fontSize: 8, color: d.isToday ? "#4e9af5" : d.isWeekend ? "#2a303c" : "#64748b", lineHeight: "10px" }}>{d.isToday ? "TODAY" : d.dayLabel}</div>
                    </div>
                  );
                })}
              </div>
            </div>

            {/* Rows */}
            {channels.map((ch, ri) => {
              const key = ch.label;
              const blocks = channelBlocks[key] || [];
              const isEmpty = blocks.length === 0;
              return (
                <div key={ri} style={{ display: "flex", borderBottom: "1px solid #1a1f27", height: ROW_H, background: ri % 2 === 0 ? "transparent" : "rgba(255,255,255,0.01)" }}>
                  <div style={{ width: LABEL_W, minWidth: LABEL_W, flexShrink: 0, padding: "0 8px", display: "flex", alignItems: "center", gap: 6, borderRight: "1px solid #2a303c", fontSize: 11, color: isEmpty ? "#3a4250" : "#e2e6ed", fontFamily: "'JetBrains Mono', monospace" }}>
                    <span style={{ fontWeight: 600 }}>{ch.number != null ? String(ch.number).padStart(2, "0") : ch.label}</span>
                    {ch.number != null && <span style={{ fontSize: 9, color: ch.purpose === "RPT-only" ? "#a78bfa" : "#4e9af5", fontWeight: 600 }}>{ch.purpose === "RPT-only" ? "RPT" : "FLX"}</span>}
                    {isEmpty && <span style={{ fontSize: 9, color: "#34d399" }}>open</span>}
                  </div>
                  <div style={{ position: "relative", display: "flex", flex: 1 }}>
                    {dates.map((d, di) => (
                      <div key={di} style={{ width: COL_W, minWidth: COL_W, height: "100%", background: d.isToday ? "rgba(78,154,245,0.06)" : d.isWeekend ? "#1a1e27" : "transparent", borderLeft: d.dow === 1 ? "1px solid #1e2530" : "none" }} />
                    ))}
                    {/* Today line */}
                    {(() => {
                      const todayIdx = dates.findIndex(d => d.isToday);
                      if (todayIdx < 0) return null;
                      return <div style={{ position: "absolute", left: todayIdx * COL_W + COL_W / 2, top: 0, bottom: 0, width: 2, background: "#4e9af5", opacity: 0.4, zIndex: 1, pointerEvents: "none" }} />;
                    })()}
                    {blocks.map((b, bi) => {
                      const bKey = blockKey(b);
                      const isSelBlock = selectedBlocks.has(bKey);
                      const isDragSelected = dragState && isSelBlock;
                      const isDraggingSingle = dragState && dragState.block.cellId === b.cellId && dragState.block.start === b.start;
                      const applyDragOffset = isDragSelected || isDraggingSingle;
                      const dragOffset = applyDragOffset ? dragState.currentOffset * COL_W : 0;
                      const bStart = daysBetween(viewStart, b.start);
                      const bEnd = daysBetween(viewStart, b.end);
                      if (bEnd < 0 || bStart >= TOTAL_DAYS) return null;
                      const left = Math.max(0, bStart) * COL_W + dragOffset;
                      const right = Math.min(TOTAL_DAYS, bEnd) * COL_W + dragOffset;
                      const width = right - left;
                      if (width <= 0) return null;

                      const color = blockColor(b.storageTemp, b.soc);
                      const borderColor = tempBaseColor(b.storageTemp);
                      const isCompleted = b.type === "completed";
                      const canDrag = !isCompleted;

                      const shortId = b.cellId.replace("CRD_","").replace("CID","");
                      const metaLine = `${b.monthLabel} · ${b.socLabel} · ${b.tempLabel}`;

                      const alphaFull = isCompleted && !b.onTest ? 0.7 : 0.85;

                      return (
                        <div
                          key={bi}
                          onClick={(e) => { e.stopPropagation(); handleBlockClick(e, b); }}
                          onMouseDown={(e) => canDrag && handlePointerDown(e, b)}
                          onTouchStart={(e) => canDrag && handlePointerDown(e, b)}
                          style={{
                            position: "absolute",
                            left, top: 3, width, height: ROW_H - 6,
                            borderRadius: 4,
                            background: b.hasOverlap
                              ? `repeating-linear-gradient(45deg, ${color}, ${color} 3px, rgba(248,113,113,0.3) 3px, rgba(248,113,113,0.3) 6px)`
                              : color,
                            opacity: applyDragOffset ? 0.85 * alphaFull : alphaFull,
                            border: b.hasOverlap ? "2px solid #f87171"
                              : isSelBlock ? "2px solid #fff"
                              : `1px solid ${borderColor}66`,
                            cursor: canDrag ? (dragState ? "grabbing" : "grab") : "pointer",
                            display: "flex", flexDirection: "column", alignItems: "center", justifyContent: "center",
                            overflow: "hidden",
                            zIndex: applyDragOffset ? 20 : isSelBlock ? 5 : b.hasOverlap ? 3 : 2,
                            transition: dragState ? "none" : "box-shadow 0.1s",
                            boxShadow: applyDragOffset ? "0 4px 16px rgba(0,0,0,0.5)" : isSelBlock ? `0 0 8px ${borderColor}` : "none",
                            userSelect: "none",
                          }}
                          title={`${b.cellId} RPT #${b.rptNumber} (${b.monthLabel}) · ${b.socLabel} SOC · ${b.tempLabel}\n${fmtDate(b.start)}→${fmtDate(b.testEnd || b.end)}${b.hasOverlap ? " ⚠ OVERLAP" : ""}${canDrag ? "\nDrag to reschedule · Shift+click to multi-select" : ""}`}
                        >
                          {width > 45 && (
                            <span style={{ fontSize: 8, fontWeight: 800, color: "#fff", textShadow: "0 1px 2px rgba(0,0,0,0.6)", whiteSpace: "nowrap", overflow: "hidden", textOverflow: "ellipsis", padding: "0 2px", lineHeight: "11px" }}>
                              {shortId}
                            </span>
                          )}
                          {width > 70 && (
                            <span style={{ fontSize: 7, fontWeight: 600, color: "rgba(255,255,255,0.85)", whiteSpace: "nowrap", overflow: "hidden", textOverflow: "ellipsis", padding: "0 2px", lineHeight: "9px" }}>
                              {metaLine}
                            </span>
                          )}
                        </div>
                      );
                    })}
                  </div>
                </div>
              );
            })}
          </div>
        </div>
      </div>

      {/* ── Selected Block Detail Panel ── */}
      {firstSelected && (
        <div ref={detailRef} style={{ marginTop: 12, background: "#1c2129", border: "1px solid " + tempBaseColor(firstSelected.storageTemp) + "99", borderRadius: 8, padding: "14px 18px" }}>
          <div style={{ display: "flex", justifyContent: "space-between", alignItems: "flex-start" }}>
            <div>
              <div style={{ display: "flex", alignItems: "center", gap: 10 }}>
                <span style={{ fontSize: 16, fontWeight: 700, color: blockColor(firstSelected.storageTemp, firstSelected.soc) }}>{firstSelected.cellId}</span>
                <span style={{ fontSize: 11, padding: "2px 8px", borderRadius: 4, background: firstSelected.type === "completed" ? (firstSelected.onTest ? "#f8717122" : "#4e9af522") : "#34d39922", color: firstSelected.type === "completed" ? (firstSelected.onTest ? "#f87171" : "#4e9af5") : "#34d399", fontWeight: 600 }}>
                  {firstSelected.type === "completed" ? (firstSelected.onTest ? "On Test" : "Completed") : "Planned"}
                </span>
                {selectedBlocks.size > 1 && <span style={{ fontSize: 11, color: "#a78bfa", fontWeight: 600 }}>+{selectedBlocks.size - 1} more selected</span>}
              </div>
              <div style={{ fontSize: 12, color: "#8891a0", marginTop: 4 }}>RPT #{firstSelected.rptNumber} · Month {firstSelected.monthLabel}</div>
            </div>
            <button onClick={() => setSelectedBlocks(new Set())} style={{ padding: "3px 10px", borderRadius: 4, border: "1px solid #2a303c", background: "transparent", color: "#8891a0", cursor: "pointer", fontSize: 11, fontFamily: "inherit" }}>✕</button>
          </div>
          <div style={{ display: "grid", gridTemplateColumns: "repeat(auto-fit, minmax(120px, 1fr))", gap: 12, marginTop: 12 }}>
            {[
              ["Start", fmtDateFull(firstSelected.start)],
              ["End", fmtDateFull(firstSelected.end)],
              ["Duration", rptDur + " days"],
              ["SOC", firstSelected.socLabel],
              ["Temp", firstSelected.tempLabel],
              ["Storage", firstSelected.assignedStorage || "—"],
              ["Channel", firstSelected.channel || "—"],
            ].map(([label, value]) => (
              <div key={label}>
                <div style={{ fontSize: 10, fontWeight: 600, color: "#64748b", textTransform: "uppercase", letterSpacing: "0.3px" }}>{label}</div>
                <div style={{ fontSize: 13, fontWeight: 500, color: "#e2e6ed", marginTop: 2 }}>{value}</div>
              </div>
            ))}
          </div>
          {firstSelected.hasOverlap && (
            <div style={{ marginTop: 10, fontSize: 11, color: "#f87171", background: "rgba(248,113,113,0.08)", padding: "6px 10px", borderRadius: 4 }}>
              ⚠ <strong>Conflict:</strong> This RPT overlaps with <strong>{(firstSelected.overlapWith || []).join(", ")}</strong> on the same channel.
            </div>
          )}
          {firstSelected.type !== "completed" && (
            <div style={{ marginTop: 10, fontSize: 11, color: "#64748b", fontStyle: "italic" }}>
              Drag to reschedule. Shift+click to select multiple, then drag any to move all.
            </div>
          )}
        </div>
      )}
    </div>
  );
}


// ═══════════════════════════════════════════════════
// CHAMBER TEMP CHIP (inline editable)
// ═══════════════════════════════════════════════════
function ChamberTempChip({ chamberIdx, temp, data, persist }) {
  const [editing, setEditing] = React.useState(false);
  const [val, setVal] = React.useState(temp || "25°C");

  const handleSave = async () => {
    const nd = JSON.parse(JSON.stringify(data));
    nd.chambers[chamberIdx].temp = val;
    await persist(nd);
    setEditing(false);
  };

  if (editing) {
    return (
      <div onClick={e => e.stopPropagation()} style={{ display: "flex", alignItems: "center", gap: 4 }}>
        <select value={val} onChange={e => setVal(e.target.value)}
          style={{ padding: "2px 6px", background: "#0c0f14", border: "1px solid #2a303c", borderRadius: 3, color: "#e2e6ed", fontSize: 11, fontFamily: "inherit" }}>
          <option value="25°C">25°C</option>
          <option value="45°C">45°C</option>
          <option value="60°C">60°C</option>
          <option value="70°C">70°C</option>
        </select>
        <button onClick={handleSave} style={{ padding: "2px 8px", borderRadius: 3, border: "1px solid #34d399", background: "transparent", color: "#34d399", cursor: "pointer", fontSize: 10, fontFamily: "inherit" }}>✓</button>
        <button onClick={(e) => { e.stopPropagation(); setVal(temp); setEditing(false); }} style={{ padding: "2px 8px", borderRadius: 3, border: "1px solid #64748b", background: "transparent", color: "#64748b", cursor: "pointer", fontSize: 10, fontFamily: "inherit" }}>✕</button>
      </div>
    );
  }

  return (
    <span onClick={e => { e.stopPropagation(); setEditing(true); }} style={{
      fontSize: 11, padding: "2px 8px", borderRadius: 4, fontWeight: 600,
      background: tempColor(temp) + "22", color: tempColor(temp),
      cursor: "pointer", transition: "filter 0.15s"
    }}
    onMouseEnter={e => e.currentTarget.style.filter = "brightness(1.3)"}
    onMouseLeave={e => e.currentTarget.style.filter = "brightness(1)"}
    >{temp}</span>
  );
}

// ═══════════════════════════════════════════════════
// RPT EVENT CHIP (inline editable)
// ═══════════════════════════════════════════════════
function RptEventChip({ event, rptIdx, eventIdx, data, persist }) {
  const [editing, setEditing] = React.useState(false);
  const [startDate, setStartDate] = React.useState(event.start || "");
  const [returnDate, setReturnDate] = React.useState(event.returned || "");

  const handleSave = async () => {
    const nd = JSON.parse(JSON.stringify(data));
    const cell = nd.rptCells[rptIdx];
    cell.events[eventIdx].start = startDate || null;
    cell.events[eventIdx].returned = returnDate || null;
    // Recompute nextRptStart from last completed event
    const lastCompleted = [...cell.events].reverse().find(e => e.returned);
    if (lastCompleted) {
      const lastOnTest = cell.events.find(e => !e.returned);
      if (!lastOnTest) {
        cell.nextRptStart = addDays(lastCompleted.returned, nd.rptSettings.restDays);
      }
    }
    await persist(nd);
    setEditing(false);
  };

  const handleCancel = () => {
    setStartDate(event.start || "");
    setReturnDate(event.returned || "");
    setEditing(false);
  };

  if (editing) {
    return (
      <div style={{
        fontSize: 11, padding: "6px 10px", borderRadius: 4,
        background: "rgba(78,154,245,0.08)", border: "1px solid rgba(78,154,245,0.4)",
        display: "flex", alignItems: "center", gap: 6, flexWrap: "wrap"
      }}>
        <span style={{ color: "#8891a0", fontWeight: 600 }}>RPT #{eventIdx + 1}:</span>
        <input type="date" value={startDate} onChange={e => setStartDate(e.target.value)}
          style={{ padding: "2px 4px", background: "#0c0f14", border: "1px solid #2a303c", borderRadius: 3, color: "#e2e6ed", fontSize: 11, fontFamily: "inherit" }} />
        <span style={{ color: "#64748b" }}>→</span>
        <input type="date" value={returnDate} onChange={e => setReturnDate(e.target.value)}
          style={{ padding: "2px 4px", background: "#0c0f14", border: "1px solid #2a303c", borderRadius: 3, color: "#e2e6ed", fontSize: 11, fontFamily: "inherit" }} />
        <button onClick={handleSave} style={{ padding: "2px 8px", borderRadius: 3, border: "1px solid #34d399", background: "transparent", color: "#34d399", cursor: "pointer", fontSize: 10, fontFamily: "inherit" }}>✓</button>
        <button onClick={handleCancel} style={{ padding: "2px 8px", borderRadius: 3, border: "1px solid #64748b", background: "transparent", color: "#64748b", cursor: "pointer", fontSize: 10, fontFamily: "inherit" }}>✕</button>
      </div>
    );
  }

  return (
    <div onClick={() => setEditing(true)} style={{
      fontSize: 11, padding: "4px 10px", borderRadius: 4, cursor: "pointer",
      background: event.returned ? "rgba(78,154,245,0.1)" : "rgba(248,113,113,0.1)",
      border: "1px solid " + (event.returned ? "rgba(78,154,245,0.3)" : "rgba(248,113,113,0.3)"),
      color: event.returned ? "#4e9af5" : "#f87171",
      transition: "filter 0.15s",
    }}
    onMouseEnter={e => e.currentTarget.style.filter = "brightness(1.3)"}
    onMouseLeave={e => e.currentTarget.style.filter = "brightness(1)"}
    >
      RPT #{eventIdx + 1}: {fmtDate(event.start)} → {event.returned ? fmtDate(event.returned) : "on test"}
    </div>
  );
}

// ═══════════════════════════════════════════════════
// RPT NEXT DATE CHIP (inline editable)
// ═══════════════════════════════════════════════════
function RptNextDateChip({ rptIdx, statusColor, statusText, onTest, nextRptStart, data, persist }) {
  const [editing, setEditing] = React.useState(false);
  const [dateVal, setDateVal] = React.useState(nextRptStart || "");

  if (onTest) {
    return <span style={{ fontSize: 11, padding: "2px 8px", borderRadius: 4, background: statusColor + "22", color: statusColor, fontWeight: 600 }}>{statusText}</span>;
  }

  if (editing) {
    const handleSave = async () => {
      const nd = JSON.parse(JSON.stringify(data));
      nd.rptCells[rptIdx].nextRptStart = dateVal || null;
      await persist(nd);
      setEditing(false);
    };
    return (
      <div style={{ display: "flex", alignItems: "center", gap: 4 }}>
        <span style={{ fontSize: 11, color: "#8891a0", fontWeight: 600 }}>Next:</span>
        <input type="date" value={dateVal} onChange={e => setDateVal(e.target.value)}
          style={{ padding: "2px 4px", background: "#0c0f14", border: "1px solid #2a303c", borderRadius: 3, color: "#e2e6ed", fontSize: 11, fontFamily: "inherit" }} />
        <button onClick={handleSave} style={{ padding: "2px 8px", borderRadius: 3, border: "1px solid #34d399", background: "transparent", color: "#34d399", cursor: "pointer", fontSize: 10, fontFamily: "inherit" }}>✓</button>
        <button onClick={() => { setDateVal(nextRptStart || ""); setEditing(false); }} style={{ padding: "2px 8px", borderRadius: 3, border: "1px solid #64748b", background: "transparent", color: "#64748b", cursor: "pointer", fontSize: 10, fontFamily: "inherit" }}>✕</button>
      </div>
    );
  }

  return (
    <span onClick={() => setEditing(true)} style={{
      fontSize: 11, padding: "2px 8px", borderRadius: 4, background: statusColor + "22", color: statusColor, fontWeight: 600,
      cursor: "pointer", transition: "filter 0.15s"
    }}
    onMouseEnter={e => e.currentTarget.style.filter = "brightness(1.3)"}
    onMouseLeave={e => e.currentTarget.style.filter = "brightness(1)"}
    >{statusText}</span>
  );
}

// ═══════════════════════════════════════════════════
// RPT STORAGE / CYCLING VIEWS
// ═══════════════════════════════════════════════════

// "X RPTs due in the next 14 days" banner, shared by Storage & Cycling.
function UpcomingRptAlert({ stats, tempFilter, expanded, setExpanded }) {
  const all = stats.allRptSorted || [];
  const list = tempFilter === "all" ? all : all.filter(r => r.storageTemp === tempFilter);
  if (list.length === 0) return null;
  const urgent = list.filter(r => { const d = daysBetween(today(), r.nextRptStart); return d >= -1 && d <= 14; }).length;
  return (
    <div style={{ background: "rgba(167,139,250,0.08)", border: "1px solid rgba(167,139,250,0.3)", borderRadius: 8, padding: "14px 18px", marginBottom: 16 }}>
      <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 8 }}>
        <div style={{ fontSize: 13, fontWeight: 600, color: "#a78bfa" }}>⚡ {urgent} RPTs due in the next 14 days{tempFilter !== "all" ? ` (${tempFilter})` : ""}</div>
        <button onClick={() => setExpanded(!expanded)} style={{ padding: "3px 10px", borderRadius: 4, border: "1px solid rgba(167,139,250,0.3)", background: "transparent", color: "#a78bfa", cursor: "pointer", fontSize: 11, fontFamily: "inherit" }}>{expanded ? "Collapse" : "Show all"}</button>
      </div>
      <div className="rpt-scroll" style={{ maxHeight: expanded ? "none" : 140, overflowY: expanded ? "visible" : "auto", transition: "max-height 0.2s" }}>
        {list.map((r, i) => {
          const daysUntil = daysBetween(today(), r.nextRptStart);
          const isUrgent = daysUntil >= -1 && daysUntil <= 14;
          const prev = i > 0 ? list[i - 1] : null;
          const prevUrgent = prev ? (daysBetween(today(), prev.nextRptStart) >= -1 && daysBetween(today(), prev.nextRptStart) <= 14) : true;
          const showDivider = !isUrgent && prevUrgent;
          return (
            <div key={i}>
              {showDivider && (
                <div style={{ borderTop: "1px solid rgba(167,139,250,0.2)", margin: "6px 0", paddingTop: 6 }}>
                  <span style={{ fontSize: 10, fontWeight: 600, textTransform: "uppercase", letterSpacing: "0.5px", color: "#64748b" }}>Later</span>
                </div>
              )}
              <div style={{ fontSize: 12, color: "#e2e6ed", padding: "3px 0", display: "flex", gap: 12, opacity: isUrgent ? 1 : 0.65 }}>
                <span style={{ color: daysUntil <= 3 ? "#f87171" : daysUntil <= 14 ? "#fbbf24" : "#34d399", fontWeight: 600, minWidth: 80 }}>
                  {daysUntil <= 0 ? "TODAY" : daysUntil === 1 ? "Tomorrow" : `In ${daysUntil} days`}
                </span>
                <span style={{ fontWeight: 500 }}>{r.cellId}</span>
                <span style={{ color: "#8891a0" }}>{r.assignedChannel} · {fmtDate(r.nextRptStart)}</span>
                <span style={{ color: "#64748b" }}>SOC {(r.soc * 100).toFixed(0)}% · {r.storageTemp}</span>
              </div>
            </div>
          );
        })}
      </div>
    </div>
  );
}

// A single cell rendered as a small square. Colored by storage temp. A cell
// that's out of its slot (on test, or awaiting return) is drawn dashed with a
// badge: ⚡ = currently cycling, ? = test finished, confirm its return date.
function CellSquare({ cell, idx, selected, dim, ghost, draggable, solid, onSelect, onDragStartCell }) {
  const col = tempColor(cell.storageTemp);
  const testing = isTesting(cell);
  const awaiting = isAwaitingReturn(cell);
  // `solid` forces the present/filled look even for on-test cells — used in the
  // Testing rectangle, where the square has "moved" out of its (dashed) slot.
  const faded = solid ? false : (ghost || testing || awaiting);
  const badge = awaiting ? "?" : testing ? "⚡" : null;
  const badgeColor = awaiting ? "#fbbf24" : "#4e9af5";
  return (
    <div
      draggable={!!draggable}
      onDragStart={draggable ? (e) => { e.dataTransfer.setData("text/plain", String(idx)); e.dataTransfer.effectAllowed = "move"; onDragStartCell && onDragStartCell(idx); } : undefined}
      onClick={(e) => { e.stopPropagation(); onSelect(idx); }}
      title={cell.cellId + " · SOC " + (cell.soc != null ? Math.round(cell.soc * 100) + "%" : "—") + " · " + (cell.storageTemp || "—") + (testing ? " · ON TEST" : awaiting ? " · AWAITING RETURN" : "")}
      style={{
        position: "relative", boxSizing: "border-box", width: "100%", aspectRatio: "1 / 1",
        borderRadius: 5, cursor: draggable ? "grab" : "pointer",
        // In-slot cells get the same solid temp+SOC fill as the Channel Usage
        // gantt blocks. On-test / awaiting cells stay dashed + transparent.
        background: faded ? "transparent" : blockColor(cell.storageTemp, cell.soc),
        border: "1.5px " + (faded ? "dashed " : "solid ") + (faded ? (awaiting ? badgeColor : col) : tempBaseColor(cell.storageTemp)) + (selected ? "" : "aa"),
        outline: selected ? "2px solid #e2e6ed" : "none", outlineOffset: 1,
        display: "flex", alignItems: "center", justifyContent: "center",
        fontSize: 10, fontWeight: faded ? 600 : 800, color: faded ? col : "#fff",
        textShadow: faded ? "none" : "0 1px 2px rgba(0,0,0,0.6)",
        fontFamily: "'JetBrains Mono', monospace", overflow: "hidden",
        opacity: dim ? 0.2 : 1, transition: "opacity 0.15s",
      }}>
      {shortCell(cell.cellId)}
      {badge && <span style={{ position: "absolute", top: 1, right: 2, fontSize: 11, fontWeight: 700, color: badgeColor, lineHeight: 1 }}>{badge}</span>}
      <div style={{ position: "absolute", left: 3, right: 3, bottom: 2, height: 2, background: faded ? "#0c0f14" : "rgba(0,0,0,0.45)", borderRadius: 1 }}>
        <div style={{ width: ((cell.soc || 0) * 100) + "%", height: "100%", background: faded ? col : "rgba(255,255,255,0.9)", borderRadius: 1 }} />
      </div>
    </div>
  );
}

// One grid square: a drop target that holds an optional cell.
function StorageSlot({ occupant, occupantIdx, chamber, shelf, slot, selectedIdx, dim, onSelect, onDropCell }) {
  const [over, setOver] = React.useState(false);
  return (
    <div
      onDragOver={(e) => { e.preventDefault(); e.dataTransfer.dropEffect = "move"; if (!over) setOver(true); }}
      onDragLeave={() => setOver(false)}
      onDrop={(e) => { e.preventDefault(); setOver(false); const idx = parseInt(e.dataTransfer.getData("text/plain"), 10); if (!isNaN(idx)) onDropCell(idx, chamber, shelf, slot); }}
      style={{ borderRadius: 6, outline: over ? "2px solid #4e9af5" : "none", outlineOffset: -1 }}>
      {occupant
        ? <CellSquare cell={occupant} idx={occupantIdx} selected={selectedIdx === occupantIdx} dim={dim} draggable onSelect={onSelect} />
        : <div style={{ width: "100%", aspectRatio: "1 / 1", borderRadius: 5, border: "1px dashed #1f2630" }} />}
    </div>
  );
}

// Storage view: each storage chamber is a rectangle of shelves (3×3 by
// default; per-shelf capacity is configurable, e.g. Chamber_2 = 12 + 10).
// Cells live in specific slots; drag to rearrange or move between
// chambers/shelves. Drag to the Unplaced tray to pull a cell off its shelf.
// A cell whose test just finished shows a "?" badge — click it to confirm the
// date it returned to storage, which schedules its next RPT.
function StorageView({ data, persist, tempFilter, selectedIdx, setSelectedIdx, onAdd, onReturn, onRemove }) {
  const [search, setSearch] = React.useState("");
  const [returnFor, setReturnFor] = React.useState(null); // rptIdx awaiting return-date confirm
  const cells = data.rptCells || [];
  const cfg = data.storageConfig || {};
  const dur = (data.rptSettings && data.rptSettings.durationDays) || 4;
  const chamberTemp = {};
  (data.chambers || []).forEach(c => { chamberTemp[c.name] = c.temp; });

  const chambers = React.useMemo(() => {
    const set = new Set();
    cells.forEach(c => { if (c.assignedStorage && STORAGE_CHAMBER_NAMES.has(c.assignedStorage)) set.add(c.assignedStorage); });
    Object.keys(cfg).filter(k => STORAGE_CHAMBER_NAMES.has(k)).forEach(k => set.add(k));
    return Array.from(set).sort((a, b) => chamberNum(a) - chamberNum(b));
  }, [cells, cfg]);

  const moveCell = async (rptIdx, chamber, shelf, slot) => {
    const nd = JSON.parse(JSON.stringify(data));
    const cs = nd.rptCells, moving = cs[rptIdx];
    if (moving.assignedStorage === chamber && (moving.storageShelf || 0) === shelf && moving.storageSlot === slot) return;
    // If the target square is occupied, swap the two cells.
    const occIdx = cs.findIndex((c, i) => i !== rptIdx && c.assignedStorage === chamber && (c.storageShelf || 0) === shelf && c.storageSlot === slot);
    const from = { ch: moving.assignedStorage, sh: moving.storageShelf || 0, sl: moving.storageSlot };
    if (occIdx >= 0) { cs[occIdx].assignedStorage = from.ch; cs[occIdx].storageShelf = from.sh; cs[occIdx].storageSlot = from.sl; }
    moving.assignedStorage = chamber; moving.storageShelf = shelf; moving.storageSlot = slot;
    await persist(nd);
  };
  const unplace = async (rptIdx) => { const nd = JSON.parse(JSON.stringify(data)); nd.rptCells[rptIdx].storageSlot = null; await persist(nd); };
  const setShelves = async (chamber, n) => {
    const nd = JSON.parse(JSON.stringify(data));
    const sc = nd.storageConfig = nd.storageConfig || {};
    const cur = shelvesOf(chamber, sc);
    const shelves = n <= cur.length ? cur.slice(0, n) : cur.concat(Array.from({ length: n - cur.length }, () => ({ ...DEFAULT_SHELF })));
    sc[chamber] = { shelves };
    await persist(nd);
  };

  const q = search.toLowerCase().trim();
  const matchSearch = (c) => q.length < 2 ? true : ((c.cellId || "").toLowerCase().includes(q) || (c.storageTemp || "").toLowerCase().includes(q));
  const matchTemp = (c) => tempFilter === "all" || c.storageTemp === tempFilter;
  const dimmed = (c) => !(matchSearch(c) && matchTemp(c));

  // Clicking an awaiting-return cell opens the return picker; otherwise details.
  const selectCell = (idx) => { if (isAwaitingReturn(cells[idx])) setReturnFor(idx); else setSelectedIdx(idx); };

  const unplaced = cells.map((c, i) => ({ c, i })).filter(x => x.c.storageSlot == null || !x.c.assignedStorage);
  const onDropTray = (e) => { e.preventDefault(); const idx = parseInt(e.dataTransfer.getData("text/plain"), 10); if (!isNaN(idx)) unplace(idx); };

  // Cells physically out of their storage slot — on a calendar-life RPT now
  // (⚡) or finished and awaiting a return date (?). One slot each in the
  // Testing rectangle, regardless of which chamber the test runs in.
  const onTestList = cells.map((c, i) => ({ c, i })).filter(x => isOnTest(x.c));

  const ret = returnFor != null ? cells[returnFor] : null;
  const retDue = ret ? (ret.dueReturn || addDays((lastEvent(ret) || {}).start || today(), dur)) : null;

  // Reset every listed cell's storage chamber from a lab Excel. Picking a file
  // uses (and saves as) the latest spreadsheet; this only moves storage
  // locations — archive, schedules, and unlisted cells are untouched.
  const excelInputRef = React.useRef(null);
  const reimportFromExcel = async (file) => {
    if (!file) return;
    if (!window.confirm(`Reset storage layout from "${file.name}"?\n\nThis re-reads the RPT Planner sheet and moves each listed cell into its storage chamber. Nothing else changes — schedules and the archive are untouched, and any active cell not in the sheet is left as-is and just listed afterward for you to archive by hand.`)) return;
    try {
      const fd = new FormData();
      fd.append("file", file);
      const r = await fetch("/api/reimport-storage", { method: "POST", body: fd });
      const j = await r.json();
      if (j && j.data) {
        await persist(j.data);
        let msg = `Storage reset: ${j.applied} cell${j.applied === 1 ? "" : "s"} placed from "${file.name}".`;
        const u = j.unlisted || [];
        if (u.length) msg += `\n\n${u.length} active cell${u.length === 1 ? "" : "s"} not in this sheet (left untouched — archive manually if done):\n` + u.join(", ");
        window.alert(msg);
      } else window.alert("Re-import failed: " + ((j && j.error) || "unknown error"));
    } catch (e) { window.alert("Re-import failed (is the server running the latest code?)"); }
  };

  return (
    <div>
      <div style={{ display: "flex", alignItems: "center", gap: 12, marginBottom: 14 }}>
        <div style={{ flex: "0 0 260px", position: "relative" }}>
          <input placeholder="Find a cell..." value={search} onChange={e => setSearch(e.target.value)}
            style={{ width: "100%", boxSizing: "border-box", padding: "7px 28px 7px 30px", borderRadius: 6, border: "1px solid #2a303c", background: "#151920", color: "#e2e6ed", fontSize: 12, fontFamily: "inherit", outline: "none" }} />
          <span style={{ position: "absolute", left: 10, top: "50%", transform: "translateY(-50%)", fontSize: 13, color: "#64748b", pointerEvents: "none" }}>⌕</span>
          {search && <span onClick={() => setSearch("")} style={{ position: "absolute", right: 10, top: "50%", transform: "translateY(-50%)", fontSize: 11, color: "#64748b", cursor: "pointer" }}>✕</span>}
        </div>
        <span style={{ fontSize: 11, color: "#64748b", flex: "1 1 auto", minWidth: 0, overflow: "hidden", textOverflow: "ellipsis", whiteSpace: "nowrap" }}>Drag between slots · ⚡ on test · ? confirm return</span>
        <input ref={excelInputRef} type="file" accept=".xlsx" style={{ display: "none" }}
          onChange={e => { const f = e.target.files[0]; e.target.value = ""; reimportFromExcel(f); }} />
        <button onClick={() => excelInputRef.current && excelInputRef.current.click()}
          title="Pick a lab Excel (.xlsx) to reset every listed cell's storage chamber from it"
          style={{ ...btnSecondary, fontSize: 12, flexShrink: 0, whiteSpace: "nowrap" }}>↺ Reset storage layout from Excel</button>
        <button onClick={onAdd} style={{ ...btnPrimary, flexShrink: 0, whiteSpace: "nowrap" }}>+ Add RPT Cell</button>
      </div>

      <div style={{ display: "flex", gap: 0, alignItems: "stretch" }}>
        {/* ── Storage — left two thirds ── */}
        <div style={{ flex: 2, minWidth: 0, paddingRight: 20 }}>
        <div style={{ display: "flex", flexWrap: "wrap", gap: 8, alignItems: "flex-start" }}>
        {chambers.map(ch => {
          const temp = chamberTemp[ch];
          const col = tempColor(temp);
          const shelves = shelvesOf(ch, cfg);
          const occCount = cells.filter(c => c.assignedStorage === ch && c.storageSlot != null).length;
          const cap = shelves.reduce((s, sh) => s + sh.cap, 0);
          const bySlot = {};
          cells.forEach((c, i) => { if (c.assignedStorage === ch && c.storageSlot != null) bySlot[(c.storageShelf || 0) + ":" + c.storageSlot] = { c, i }; });
          const lastShelfOccupied = cells.some(c => c.assignedStorage === ch && (c.storageShelf || 0) >= shelves.length - 1 && shelves.length > 1 && c.storageSlot != null);
          return (
            <div key={ch} style={{ background: "#11151b", border: "1px solid #2a303c", borderRadius: 10, padding: 12, width: "fit-content" }}>
              <div style={{ display: "flex", alignItems: "center", justifyContent: "space-between", gap: 14, marginBottom: 10 }}>
                <div style={{ display: "flex", alignItems: "center", gap: 8 }}>
                  <span style={{ width: 9, height: 9, borderRadius: 2, background: col }} />
                  <span style={{ fontSize: 13, fontWeight: 700 }}>{ch}</span>
                  {temp && <span style={{ fontSize: 11, color: col }}>{temp}</span>}
                  <span style={{ fontSize: 11, color: "#64748b" }}>· {occCount}/{cap}</span>
                </div>
                <div style={{ display: "flex", gap: 4 }}>
                  {[1, 2].map(n => {
                    const active = shelves.length === n;
                    const disabled = n === 1 && lastShelfOccupied;
                    return (
                      <button key={n} disabled={disabled}
                        title={disabled ? "Second shelf has cells — move them first" : (n === 1 ? "1 shelf" : "2 shelves")}
                        onClick={() => setShelves(ch, n)} style={{
                          padding: "2px 7px", borderRadius: 4, border: "1px solid " + (active ? "#a78bfa" : "#2a303c"),
                          background: active ? "rgba(167,139,250,0.12)" : "transparent",
                          color: active ? "#a78bfa" : disabled ? "#3a4250" : "#64748b",
                          cursor: disabled ? "not-allowed" : "pointer", fontSize: 10, fontFamily: "inherit",
                        }}>{n}</button>
                    );
                  })}
                </div>
              </div>
              {shelves.map((shelf, sh) => (
                <div key={sh} style={{ marginTop: sh ? 10 : 0 }}>
                  {shelves.length > 1 && <div style={{ fontSize: 10, fontWeight: 600, color: "#64748b", marginBottom: 4, textTransform: "uppercase", letterSpacing: "0.4px" }}>Shelf {sh + 1} · {shelf.cap}</div>}
                  <div style={{ display: "grid", gridTemplateColumns: `repeat(${shelf.cols}, 46px)`, gap: 5 }}>
                    {Array.from({ length: shelf.cap }).map((_, sl) => {
                      const hit = bySlot[sh + ":" + sl];
                      return <StorageSlot key={sl} occupant={hit ? hit.c : null} occupantIdx={hit ? hit.i : null}
                        chamber={ch} shelf={sh} slot={sl} selectedIdx={selectedIdx} dim={hit ? dimmed(hit.c) : false}
                        onSelect={selectCell} onDropCell={moveCell} />;
                    })}
                  </div>
                </div>
              ))}
            </div>
          );
        })}
      </div>

      <div onDragOver={(e) => e.preventDefault()} onDrop={onDropTray}
        style={{ marginTop: 16, background: "#11151b", border: "1px dashed #2a303c", borderRadius: 10, padding: 14, minHeight: 70 }}>
        <div style={{ fontSize: 11, fontWeight: 600, color: "#64748b", marginBottom: 8, textTransform: "uppercase", letterSpacing: "0.4px" }}>Unplaced ({unplaced.length}) — drag here to pull a cell off its shelf</div>
        <div style={{ display: "flex", flexWrap: "wrap", gap: 6 }}>
          {unplaced.length === 0 && <span style={{ fontSize: 11, color: "#3a4250", fontStyle: "italic" }}>none</span>}
          {unplaced.map(({ c, i }) => (
            <div key={i} style={{ width: 40 }}>
              <CellSquare cell={c} idx={i} selected={selectedIdx === i} dim={dimmed(c)} draggable onSelect={selectCell} />
            </div>
          ))}
        </div>
      </div>
        </div>

        {/* ── Testing — right third, behind a dashed divider ── */}
        <div style={{ flex: 1, minWidth: 0, borderLeft: "2px dashed #2a303c", paddingLeft: 20 }}>
          <div style={{ display: "flex", alignItems: "center", gap: 8, marginBottom: 10 }}>
            <span style={{ fontSize: 13, fontWeight: 700 }}>Testing</span>
            <span style={{ fontSize: 11, color: "#64748b" }}>· {onTestList.length} out of storage</span>
          </div>
          <div style={{ background: "#11151b", border: "1px solid #2a303c", borderRadius: 10, padding: 14, minHeight: 120 }}>
            {onTestList.length === 0
              ? <span style={{ fontSize: 11, color: "#3a4250", fontStyle: "italic" }}>No cells on test right now.</span>
              : <div style={{ display: "grid", gridTemplateColumns: "repeat(auto-fill, 46px)", gap: 6 }}>
                  {onTestList.map(({ c, i }) => (
                    <CellSquare key={i} cell={c} idx={i} selected={selectedIdx === i} dim={dimmed(c)} solid draggable onSelect={selectCell} />
                  ))}
                </div>}
          </div>
          <div style={{ fontSize: 10, color: "#3a4250", marginTop: 8, lineHeight: 1.5 }}>
            One slot per cell on a calendar-life RPT (any chamber). ⚡ cycling · ? confirm return.
          </div>
        </div>
      </div>

      {ret && (
        <ReturnPopover cell={ret} due={retDue} estReturn={ret.estReturn}
          onPick={(d) => { onReturn(returnFor, d); setReturnFor(null); }}
          onRemove={() => { onRemove(returnFor); setReturnFor(null); }}
          onClose={() => setReturnFor(null)} />
      )}
    </div>
  );
}

// "Returned to storage on:" picker shown when a finished cell needs its return
// date confirmed. Offers the due date, the next two business days, a custom
// date, and the option to remove the cell from calendar-life testing.
function ReturnPopover({ cell, due, estReturn, onPick, onRemove, onClose }) {
  const [custom, setCustom] = React.useState(estReturn || due || today());
  const opts = [
    { label: "The day it was due", d: due },
    { label: "Next business day", d: due ? addBusinessDays(due, 1) : null },
    { label: "Two business days after", d: due ? addBusinessDays(due, 2) : null },
  ];
  return (
    <>
      <div onClick={onClose} style={{ position: "fixed", inset: 0, background: "rgba(0,0,0,0.5)", zIndex: 210 }} />
      <div style={{ position: "fixed", top: "50%", left: "50%", transform: "translate(-50%,-50%)", zIndex: 211, background: "#11151b", border: "1px solid #2a303c", borderRadius: 10, padding: 20, width: 340, boxShadow: "0 12px 40px rgba(0,0,0,0.5)" }}>
        <div style={{ fontSize: 15, fontWeight: 700 }}>{cell.cellId}</div>
        <div style={{ fontSize: 12, color: "#8891a0", marginTop: 4, marginBottom: 14 }}>Returned to storage on:</div>
        {estReturn && (
          <button onClick={() => onPick(estReturn)} style={{
            display: "flex", justifyContent: "space-between", alignItems: "center", width: "100%", marginBottom: 6,
            padding: "9px 12px", borderRadius: 6, border: "1px solid #a78bfa", background: "rgba(167,139,250,0.12)",
            color: "#e2e6ed", cursor: "pointer", fontSize: 12, fontFamily: "inherit",
          }}>
            <span>Detected off-test <span style={{ color: "#64748b", fontSize: 10 }}>(from data)</span></span>
            <span style={{ color: "#a78bfa", fontWeight: 600, fontFamily: "'JetBrains Mono', monospace" }}>{fmtDateFull(estReturn)}</span>
          </button>
        )}
        {opts.map((o, i) => (
          <button key={i} disabled={!o.d} onClick={() => onPick(o.d)} style={{
            display: "flex", justifyContent: "space-between", alignItems: "center", width: "100%", marginBottom: 6,
            padding: "9px 12px", borderRadius: 6, border: "1px solid #2a303c", background: "transparent",
            color: o.d ? "#e2e6ed" : "#3a4250", cursor: o.d ? "pointer" : "default", fontSize: 12, fontFamily: "inherit",
          }}>
            <span>{o.label}</span>
            <span style={{ color: "#34d399", fontFamily: "'JetBrains Mono', monospace" }}>{o.d ? fmtDateFull(o.d) : "—"}</span>
          </button>
        ))}
        <div style={{ display: "flex", gap: 6, alignItems: "center", marginTop: 4 }}>
          <input type="date" value={custom} onChange={e => setCustom(e.target.value)}
            style={{ flex: 1, padding: "7px 10px", borderRadius: 6, border: "1px solid #2a303c", background: "#0c0f14", color: "#e2e6ed", fontSize: 12, fontFamily: "inherit", outline: "none" }} />
          <button onClick={() => custom && onPick(custom)} style={{ ...btnSmall, borderColor: "#4e9af5", color: "#4e9af5" }}>Set</button>
        </div>
        <div style={{ borderTop: "1px solid #1a1f27", marginTop: 14, paddingTop: 12, display: "flex", justifyContent: "space-between" }}>
          <button onClick={onRemove} style={{ ...btnSmall, borderColor: "#f87171", color: "#f87171" }}>Move cell to archive</button>
          <button onClick={onClose} style={btnSecondary}>Cancel</button>
        </div>
      </div>
    </>
  );
}

// Right-hand drawer with full detail for one cell. Scheduling is automatic
// (driven by detected runs + the 4-on/28-off cadence), so it's read-only.
function CellDetailDrawer({ data, rptIdx, onClose, onRemove }) {
  const r = (data.rptCells || [])[rptIdx];
  if (!r) return null;
  const testing = isTesting(r), awaiting = isAwaitingReturn(r);
  const daysUntil = r.nextRptStart ? daysBetween(today(), r.nextRptStart) : null;
  const statusColor = (testing || awaiting) ? "#f87171" : daysUntil == null ? "#64748b" : daysUntil <= 3 ? "#f87171" : daysUntil <= 14 ? "#fbbf24" : "#34d399";
  const statusText = testing ? "On RPT now" : awaiting ? "Awaiting return" : r.nextRptStart ? (daysUntil <= 0 ? "RPT due" : `Next RPT in ${daysUntil}d`) : "No schedule";
  const loc = r.storageSlot != null
    ? `${r.assignedStorage || "—"} · shelf ${(r.storageShelf || 0) + 1}, slot ${r.storageSlot + 1}`
    : (r.assignedStorage ? `${r.assignedStorage} (unplaced)` : "Unplaced");
  // Full run history: every RPT this cell has been on, newest first. The open
  // (last) event shows whether it's cycling now or waiting for a return date.
  const events = r.events || [];
  const history = events.map((ev, i) => ({
    n: i + 1, start: ev.start, returned: ev.returned, open: !ev.returned, file: ev.file,
  })).reverse();
  const firstStart = events.length ? events[0].start : r.anchorDate;
  // Next few projected RPTs from the cadence.
  const upcoming = [];
  if (r.nextRptStart) { let d = r.nextRptStart; for (let i = 0; i < 4; i++) { upcoming.push(d); d = addDays(d, RPT_PERIOD_DAYS); } }
  const row = (label, value) => (
    <div style={{ display: "flex", justifyContent: "space-between", padding: "6px 0", borderBottom: "1px solid #1a1f27", fontSize: 12 }}>
      <span style={{ color: "#64748b" }}>{label}</span>
      <span style={{ color: "#e2e6ed", fontWeight: 500 }}>{value}</span>
    </div>
  );
  return (
    <>
      <div onClick={onClose} style={{ position: "fixed", inset: 0, background: "rgba(0,0,0,0.4)", zIndex: 200 }} />
      <div style={{ position: "fixed", top: 0, right: 0, height: "100vh", width: 360, background: "#11151b", borderLeft: "1px solid #2a303c", zIndex: 201, padding: 20, overflowY: "auto", boxShadow: "-8px 0 24px rgba(0,0,0,0.4)" }}>
        <div style={{ display: "flex", justifyContent: "space-between", alignItems: "flex-start", marginBottom: 14 }}>
          <div>
            <div style={{ fontSize: 16, fontWeight: 700 }}>{r.cellId}</div>
            <span style={{ display: "inline-block", marginTop: 6, fontSize: 11, padding: "2px 8px", borderRadius: 4, background: statusColor + "22", color: statusColor, fontWeight: 600 }}>{statusText}</span>
          </div>
          <button onClick={onClose} style={{ background: "transparent", border: "none", color: "#64748b", fontSize: 20, cursor: "pointer", lineHeight: 1 }}>×</button>
        </div>

        {row("SOC", r.soc != null ? (r.soc * 100).toFixed(0) + "%" : "—")}
        {row("Storage temp", r.storageTemp || "—")}
        {row("Location", loc)}
        {row("RPT channel", r.assignedChannel || "—")}
        {row("Cadence", `${r.nextRptMonth || "—"} · ${RPT_ON_DAYS}d on / ${RPT_PERIOD_DAYS - RPT_ON_DAYS}d storage`)}
        {row("First RPT", firstStart ? fmtDateFull(firstStart) : "—")}
        {row("Type", r.rptType || "—")}

        <div style={{ marginTop: 18 }}>
          <div style={{ fontSize: 11, fontWeight: 600, color: "#64748b", marginBottom: 8, textTransform: "uppercase", letterSpacing: "0.4px" }}>RPT history ({events.length})</div>
          {history.length === 0 && <div style={{ fontSize: 11, color: "#3a4250", fontStyle: "italic" }}>No runs recorded yet.</div>}
          {history.map((h, i) => {
            const offText = h.open ? (testing ? "on test" : "awaiting return") : fmtDateFull(h.returned);
            const offColor = h.open ? (testing ? "#4e9af5" : "#fbbf24") : "#8891a0";
            return (
              <div key={i} style={{ padding: "5px 0", borderBottom: "1px solid #1a1f27", fontSize: 11, fontFamily: "'JetBrains Mono', monospace" }}>
                <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center" }}>
                  <span style={{ color: "#64748b", minWidth: 34 }}>#{h.n}</span>
                  <span style={{ color: "#e2e6ed", flex: 1, textAlign: "right" }}>{fmtDateFull(h.start)}</span>
                  <span style={{ color: "#3a4250", margin: "0 6px" }}>→</span>
                  <span style={{ color: offColor, minWidth: 86, textAlign: "right" }}>{offText}</span>
                </div>
                {h.file && (
                  <div title={h.file} style={{ marginTop: 2, fontSize: 9, color: "#4a5260", whiteSpace: "nowrap", overflow: "hidden", textOverflow: "ellipsis" }}>{h.file}</div>
                )}
              </div>
            );
          })}
        </div>

        {upcoming.length > 0 && (
          <div style={{ marginTop: 18 }}>
            <div style={{ fontSize: 11, fontWeight: 600, color: "#64748b", marginBottom: 8, textTransform: "uppercase", letterSpacing: "0.4px" }}>Projected RPTs</div>
            <div style={{ display: "flex", gap: 6, flexWrap: "wrap" }}>
              {upcoming.map((d, i) => (
                <span key={i} style={{ fontSize: 11, padding: "3px 8px", borderRadius: 4, background: i === 0 ? statusColor + "22" : "#0c0f14", color: i === 0 ? statusColor : "#8891a0", fontFamily: "'JetBrains Mono', monospace" }}>{fmtDateFull(d)}</span>
              ))}
            </div>
          </div>
        )}

        <div style={{ display: "flex", gap: 8, marginTop: 20 }}>
          <button onClick={() => { onRemove(rptIdx); onClose(); }} style={{ ...btnSmall, borderColor: "#f87171", color: "#f87171" }}>Move cell to archive</button>
        </div>
        <div style={{ fontSize: 10, color: "#3a4250", marginTop: 10, lineHeight: 1.5 }}>
          Storage location auto-assigned from the filename temperature — drag the cell on the Storage tab to correct it.
        </div>
      </div>
    </>
  );
}

// ═══════════════════════════════════════════════════
// RPT ADD MODAL
// ═══════════════════════════════════════════════════
function RptAddModal({ data, onAdd, onClose }) {
  const [cellId, setCellId] = React.useState("");
  const [soc, setSoc] = React.useState("1.0");
  const [storageTemp, setStorageTemp] = React.useState("25°C");
  const [assignedChannel, setAssignedChannel] = React.useState("");
  const [assignedStorage, setAssignedStorage] = React.useState("");
  const [nextStart, setNextStart] = React.useState(today());

  return (
    <Overlay onClose={onClose}>
      <div style={{ fontSize: 16, fontWeight: 600, marginBottom: 16 }}>Add RPT Cell</div>
      <Field label="Cell ID">
        <input value={cellId} onChange={e => setCellId(e.target.value)} placeholder="CRD_XX_CID####" style={inputStyle} />
      </Field>
      <Field label="SOC">
        <select value={soc} onChange={e => setSoc(e.target.value)} style={inputStyle}>
          <option value="0">0%</option><option value="0.5">50%</option><option value="1.0">100%</option>
        </select>
      </Field>
      <Field label="Storage Temperature">
        <select value={storageTemp} onChange={e => setStorageTemp(e.target.value)} style={inputStyle}>
          <option>25°C</option><option>45°C</option><option>60°C</option><option>70°C</option>
        </select>
      </Field>
      <Field label="Assigned RPT Channel (e.g. Chamber_9-04)">
        <input value={assignedChannel} onChange={e => setAssignedChannel(e.target.value)} style={inputStyle} />
      </Field>
      <Field label="Storage Chamber (e.g. Chamber_1)">
        <input value={assignedStorage} onChange={e => setAssignedStorage(e.target.value)} style={inputStyle} />
      </Field>
      <Field label="First RPT Date (anchor for the cadence)">
        <input type="date" value={nextStart} onChange={e => setNextStart(e.target.value)} style={inputStyle} />
      </Field>
      <div style={{ display: "flex", gap: 8, marginTop: 16 }}>
        <button disabled={!cellId} onClick={() => onAdd({
          cellId, soc: parseFloat(soc), storageTemp, rptType: "Calendar Life RPT",
          assignedChannel, assignedStorage, anchorDate: nextStart, nextRptStart: nextStart, nextRptMonth: "0M",
          storageShelf: null, storageSlot: null, events: [], capacityMah: null,
        })} style={{ ...btnPrimary, opacity: cellId ? 1 : 0.4 }}>Add Cell</button>
        <button onClick={onClose} style={btnSecondary}>Cancel</button>
      </div>
    </Overlay>
  );
}

// ═══════════════════════════════════════════════════
// SETTINGS MODAL
// ═══════════════════════════════════════════════════
function SettingsModal({ data, onSave, onClose, onReset }) {
  const [dur, setDur] = React.useState(data.rptSettings?.durationDays || 4);
  const [rest, setRest] = React.useState(data.rptSettings?.restDays || 28);
  const [confirmReset, setConfirmReset] = React.useState(false);

  return (
    <Overlay onClose={onClose}>
      <div style={{ fontSize: 16, fontWeight: 600, marginBottom: 16 }}>Settings</div>

      <div style={{ fontSize: 13, fontWeight: 600, color: "#8891a0", marginBottom: 8 }}>RPT Parameters</div>
      <Field label="RPT Duration (days)">
        <input type="number" value={dur} onChange={e => setDur(parseInt(e.target.value) || 0)} style={inputStyle} />
      </Field>
      <Field label="Rest Days Between RPTs">
        <input type="number" value={rest} onChange={e => setRest(parseInt(e.target.value) || 0)} style={inputStyle} />
      </Field>
      <div style={{ fontSize: 11, color: "#64748b", marginBottom: 16 }}>
        With these settings, a cell will rest {rest} days between RPTs. Each RPT takes {dur} days on the cycler.
        Total cycle: {dur + rest} days.
      </div>

      <div style={{ display: "flex", gap: 8 }}>
        <button onClick={() => onSave({ durationDays: dur, restDays: rest })} style={btnPrimary}>Save Settings</button>
        <button onClick={onClose} style={btnSecondary}>Cancel</button>
      </div>

      <div style={{ borderTop: "1px solid #2a303c", marginTop: 24, paddingTop: 16 }}>
        <div style={{ fontSize: 13, fontWeight: 600, color: "#f87171", marginBottom: 8 }}>Danger Zone</div>
        {!confirmReset ? (
          <button onClick={() => setConfirmReset(true)} style={{ ...btnDanger, fontSize: 12 }}>Reset All Data to Original Excel</button>
        ) : (
          <div style={{ display: "flex", gap: 8, alignItems: "center" }}>
            <span style={{ fontSize: 12, color: "#f87171" }}>Are you sure? This erases all changes.</span>
            <button onClick={() => { onReset(); onClose(); }} style={btnDanger}>Yes, Reset</button>
            <button onClick={() => setConfirmReset(false)} style={btnSecondary}>Cancel</button>
          </div>
        )}
      </div>
    </Overlay>
  );
}

// ─── Shared UI Components ───
function SyncTimer({ lastSynced }) {
  const [, setTick] = React.useState(0);
  React.useEffect(() => {
    const t = setInterval(() => setTick(n => n + 1), 10000);
    return () => clearInterval(t);
  }, []);
  if (!lastSynced) return null;
  const secs = Math.round((Date.now() - lastSynced.getTime()) / 1000);
  const label = secs < 10 ? "Just now" : secs < 60 ? `${secs}s ago` : `${Math.floor(secs / 60)}m ago`;
  return <span style={{ fontSize: 10, color: "#64748b" }}>Synced {label}</span>;
}

function Overlay({ children, onClose }) {
  return (
    <div onClick={onClose} style={{
      position: "fixed", top: 0, left: 0, right: 0, bottom: 0,
      background: "rgba(0,0,0,0.6)", display: "flex", alignItems: "center", justifyContent: "center",
      zIndex: 200, backdropFilter: "blur(4px)"
    }}>
      <div onClick={e => e.stopPropagation()} style={{
        background: "#1c2129", border: "1px solid #2a303c", borderRadius: 12,
        padding: 24, maxWidth: 480, width: "90%", maxHeight: "80vh", overflowY: "auto"
      }}>
        {children}
      </div>
    </div>
  );
}

function Field({ label, children }) {
  return (
    <div style={{ marginBottom: 10 }}>
      <div style={{ fontSize: 11, fontWeight: 600, color: "#8891a0", marginBottom: 4, textTransform: "uppercase", letterSpacing: "0.3px" }}>{label}</div>
      {children}
    </div>
  );
}

const inputStyle = {
  width: "100%", padding: "8px 10px", background: "#0c0f14", border: "1px solid #2a303c",
  borderRadius: 6, color: "#e2e6ed", fontSize: 13, fontFamily: "inherit", outline: "none"
};

const btnPrimary = {
  padding: "8px 16px", borderRadius: 6, border: "1px solid #4e9af5",
  background: "rgba(78,154,245,0.15)", color: "#4e9af5", cursor: "pointer",
  fontSize: 13, fontWeight: 500, fontFamily: "inherit"
};

const btnSecondary = {
  padding: "8px 16px", borderRadius: 6, border: "1px solid #2a303c",
  background: "transparent", color: "#8891a0", cursor: "pointer",
  fontSize: 13, fontFamily: "inherit"
};

const btnDanger = {
  padding: "8px 16px", borderRadius: 6, border: "1px solid #f87171",
  background: "rgba(248,113,113,0.1)", color: "#f87171", cursor: "pointer",
  fontSize: 13, fontWeight: 500, fontFamily: "inherit"
};

const btnSmall = {
  padding: "4px 10px", borderRadius: 4, border: "1px solid #2a303c",
  background: "transparent", cursor: "pointer", fontSize: 11, fontFamily: "inherit"
};

const _root = ReactDOM.createRoot(document.getElementById("root"));
_root.render(<App />);
</script>
