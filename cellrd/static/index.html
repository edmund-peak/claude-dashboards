const today = () => new Date().toISOString().slice(0, 10);
const addDays = (dateStr, days) => {
  const d = new Date(dateStr); d.setDate(d.getDate() + days);
  return d.toISOString().slice(0, 10);
};
const daysBetween = (a, b) => Math.round((new Date(b) - new Date(a)) / 86400000);
const fmtDate = (d) => { if (!d) return "—"; const dt = new Date(d + "T00:00:00"); return dt.toLocaleDateString("en-US", { month: "short", day: "numeric" }); };
const fmtDateFull = (d) => { if (!d) return "—"; const dt = new Date(d + "T00:00:00"); return dt.toLocaleDateString("en-US", { month: "short", day: "numeric", year: "numeric" }); };

const tempColor = (t) => {
  if (t?.includes("25")) return "#2dd4bf";
  if (t?.includes("45")) return "#fbbf24";
  if (t?.includes("60")) return "#f87171";
  if (t?.includes("70")) return "#fb923c";
  return "#64748b";
};

// Solid temp+SOC fill, shared by the Channel Usage gantt blocks and the
// Storage tab cell squares so the two views read as the same object. Hue =
// storage temp; lightness darkens with SOC (fuller cell = darker).
const TEMP_HUES = {
  "25°C": { h: 174, s: 72, lMin: 30, lMax: 70 },
  "45°C": { h: 45,  s: 80, lMin: 35, lMax: 70 },
  "60°C": { h: 0,   s: 75, lMin: 32, lMax: 68 },
  "70°C": { h: 25,  s: 80, lMin: 32, lMax: 68 },
};
const blockColor = (storageTemp, soc) => {
  const t = TEMP_HUES[storageTemp] || { h: 220, s: 50, lMin: 35, lMax: 70 };
  const socVal = soc != null ? soc : 0.5;
  const l = t.lMax - socVal * (t.lMax - t.lMin);
  return `hsl(${t.h}, ${t.s}%, ${Math.round(l)}%)`;
};
const tempBaseColor = (storageTemp) => blockColor(storageTemp, 0.6);

// storageConfig[chamber] -> [{cap, cols}]. Accepts the legacy integer form
// (N shelves) and falls back to a single 4-col × 3-row shelf.
const shelvesOf = (chamber, sc) => {
  const cfg = (sc || {})[chamber];
  if (cfg && Array.isArray(cfg.shelves) && cfg.shelves.length)
    return cfg.shelves.map(s => ({ cap: s.cap || DEFAULT_SHELF.cap, cols: s.cols || DEFAULT_SHELF.cols }));
  if (typeof cfg === "number" && cfg > 0)
    return Array.from({ length: cfg }, () => ({ ...DEFAULT_SHELF }));
  return [{ ...DEFAULT_SHELF }];
};

// Cadence: 4 days on test, 28 in storage (32-day period). Used for the
// projected-RPT list in the detail drawer.
const RPT_PERIOD_DAYS = 32, RPT_ON_DAYS = 4;

// Run state, driven by the watcher (`running`) + the event log.
const lastEvent = (c) => (c && c.events && c.events.length) ? c.events[c.events.length - 1] : null;
const daysSinceDate = (s) => { const t = new Date(); t.setHours(0, 0, 0, 0); return Math.floor((t - new Date(s + "T00:00:00")) / 86400000); };
// On test = file writing now, OR an open run still inside its ~4-day test window.
const isTesting = (c) => { if (c && c.running) return true; const e = lastEvent(c); return !!(e && !e.returned && e.start && daysSinceDate(e.start) <= RPT_ON_DAYS + 3); };
// Awaiting return = the run is open but its test window has passed (needs a return date).
const isAwaitingReturn = (c) => { const e = lastEvent(c); return !!(e && !e.returned) && !isTesting(c); };
const isOnTest = (c) => isTesting(c) || isAwaitingReturn(c); // physically out of its storage slot

// Weekends / business-day math for the "returned to storage on" quick picks.
const isWeekend = (d) => { const g = new Date(d + "T00:00:00").getDay(); return g === 0 || g === 6; };
const addBusinessDays = (dateStr, n) => { let d = dateStr, added = 0; while (added < n) { d = addDays(d, 1); if (!isWeekend(d)) added++; } return d; };

// Short label for a small square, e.g. CRD_00_CID0227 -> "0227"
const shortCell = (id) => { const m = (id || "").match(/CID0*(\d+)/i); return m ? m[1] : (id || "").slice(-4); };
// Channel number out of an "Chamber_9-04" style string
const rptChannelNum = (ch) => { const m = (ch || "").match(/-(\d+)\s*$/); return m ? parseInt(m[1], 10) : null; };
// Sort chamber names by their trailing number ("Chamber_2" < "Chamber_10")
const chamberNum = (name) => { const m = (name || "").match(/(\d+)/); return m ? parseInt(m[1], 10) : 999; };

const getChamberCategory = (c) => {
  if (c.category) return c.category;
  const n = c.name;
  if (["Chamber_1","Chamber_2","Chamber_3","Chamber_4","Chamber_5","Chamber_6"].includes(n)) return "Standard Testing";
  if (n === "Chamber_9") return "RPT";
  if (n === "Chamber_8") return "Formation";
  return "Miscellaneous";
};

const STORAGE_KEY = "cellrd-lab-data-v4";

// ─── Storage Layer (Flask backend) ───
async function loadData(view) {
  try {
    const url = view === "stable" ? "/api/data?view=stable" : "/api/data";
    const r = await fetch(url, { cache: "no-store" });
    if (!r.ok) return null;
    return await r.json();
  } catch (e) { return null; }
}

async function saveData(data) {
  try {
    await fetch("/api/data", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify(data),
    });
  } catch (e) { console.error("Save failed:", e); }
}

// Names of chambers whose channels are driven by the file watcher.
// User edits to cellId/currentTest/startDate on these are NOT persisted —
// the backend overwrites them on every scan.
const AUTO_SYNC_CHAMBERS = new Set([
  "Chamber_1","Chamber_2","Chamber_3","Chamber_4","Chamber_5","Chamber_6",
  "Chamber_7","Chamber_8","Chamber_9","HighTemp","CoinCell_1","CoinCell_2"
]);
const isAutoSyncChamber = (name) => AUTO_SYNC_CHAMBERS.has(name);

}

async function triggerRescan() {

// Small badge showing watcher health + view-mode toggle.
// When any folder is currently being updated by Neware, shows a toggle
// between "stable" view (skips in-progress batches) and "live" view.
function WatcherBadge({ viewMode, setViewMode }) {
  const [s, setS] = React.useState(null);
  React.useEffect(() => {
    let alive = true;
    const tick = async () => {
      const st = await loadWatcherStatus();
      if (alive) setS(st);
    };
    tick();
    const id = setInterval(tick, 10000);
    return () => { alive = false; clearInterval(id); };
  }, []);
  if (!s) return null;
  const last = s.last_scan ? new Date(s.last_scan) : null;
  const ago = last ? Math.round((Date.now() - last.getTime()) / 1000) : null;
  const agoStr = ago == null ? "—" : ago < 60 ? ago + "s" : Math.round(ago / 60) + "m";
  const ok = s.total_files > 0;
  const anyUpdating = !!s.any_folder_updating;
  const stableFrozen = !!s.stable_frozen;
  const folders = s.watch_folders || (s.watch_folder ? [s.watch_folder] : []);

  // When nothing is updating, the two views are identical and we don't show
  // the toggle. The displayed count is just the channel count, no label.
  // When something IS updating, we differentiate: show the toggle, label the
  // count according to the active view, and color the badge amber to flag
  // that stable view may not reflect what Neware is currently writing.
  const showToggle = anyUpdating;
  const displayCount = anyUpdating
    ? (viewMode === "stable" ? s.stable_active_channels : s.active_channels)
    : s.active_channels;
  const color = !ok ? "#fbbf24"
              : (anyUpdating && viewMode === "stable") ? "#8891a0"
              : "#2dd4bf";

  const folderStats = s.folder_stats || [];

  // Shorten a full path to just its last component for display
  const shortName = (p) => p.replace(/\\/g, "/").replace(/\/$/, "").split("/").pop();

  // How long ago a folder's newest file was touched
  const folderAgo = (fs) => {
    if (!fs.newest) return "no files";
    const secs = Math.round((Date.now() - new Date(fs.newest).getTime()) / 1000);
    if (secs < 60) return secs + "s ago";
    if (secs < 3600) return Math.round(secs / 60) + "m ago";
    return Math.round(secs / 3600) + "h ago";
  };

  return (
    <div style={{ display: "flex", alignItems: "center", gap: 6 }}>
      <button
        onClick={async () => { await triggerRescan(); }}
        title={"Last scan: " + agoStr + " ago\n" + s.total_files + " total files\nClick to rescan now"}
        style={{
          display: "flex", alignItems: "center", gap: 6,
          padding: "5px 10px", borderRadius: 999, fontSize: 11,
          fontFamily: "'JetBrains Mono', monospace", letterSpacing: "0.3px",
          background: color + "14", border: "1px solid " + color + "55",
          color: color, cursor: "pointer", fontWeight: 600
        }}>
        <span style={{ width: 6, height: 6, borderRadius: 3, background: color }} />
        ⟲ {displayCount}{anyUpdating ? " " + viewMode : " cells"} · {agoStr}
      </button>
      {folderStats.map(fs => {
        const updating = !!fs.updating;
        const fc = updating ? "#2dd4bf" : "#64748b";
        return (
          <button key={fs.folder}
                onClick={() => openFolder(fs.folder)}
                title={fs.folder + "\n" + (fs.file_count || 0) + " files\nNewest: " + folderAgo(fs) + "\nClick to open this folder"}
                style={{
                  padding: "5px 10px", borderRadius: 999, fontSize: 11,
                  fontFamily: "inherit", letterSpacing: "0.2px",
                  background: fc + (updating ? "1a" : "0f"), border: "1px solid " + fc + (updating ? "55" : "33"),
                  color: fc, fontWeight: updating ? 600 : 400, display: "inline-flex",
                  alignItems: "center", gap: 5, cursor: "pointer",
                }}>
            <span style={{ width: 6, height: 6, borderRadius: 3, background: fc,
                           animation: updating ? "pulse 1.4s ease-in-out infinite" : "none" }} />
            {fs.label || shortName(fs.folder)} · {folderAgo(fs)}
          </button>
        );
      })}
      {/* Live/stable toggle removed — view is locked to the stable snapshot.
          Folder update indicators above are kept. */}
    </div>
  );
}

// Inline editor for a single string field on a channel.
// Click to edit; Enter or click-away saves; Escape cancels.
// Stops propagation so it doesn't trigger the row's edit-channel onClick.
function InlineFieldEdit({ value, placeholder, onCommit, style, suggestions }) {
  const [editing, setEditing] = React.useState(false);
  const [draft, setDraft] = React.useState(value || "");
  const inputRef = React.useRef(null);

  React.useEffect(() => { if (!editing) setDraft(value || ""); }, [value, editing]);
  React.useEffect(() => {
    if (editing && inputRef.current) {
      inputRef.current.focus();
      inputRef.current.select();
    }
  }, [editing]);

  const commit = () => {
    const next = draft.trim() || null;
    setEditing(false);
    if ((value || null) !== next) onCommit(next);
  };
  const cancel = () => { setDraft(value || ""); setEditing(false); };

  if (editing) {
    return (
      <span onClick={e => e.stopPropagation()} style={{ display: "inline-block", maxWidth: "100%" }}>
        <input
          ref={inputRef}
          value={draft}
          onChange={e => setDraft(e.target.value)}
          onBlur={commit}
          onKeyDown={e => {
            if (e.key === "Enter") { e.preventDefault(); commit(); }
            else if (e.key === "Escape") { e.preventDefault(); cancel(); }
          }}
          list={suggestions ? "inline-suggestions" : undefined}
          placeholder={placeholder}
          style={{
            background: "#0c0f14", border: "1px solid #2dd4bf", borderRadius: 3,
            color: "#e2e6ed", padding: "1px 5px", fontSize: 11, fontFamily: "inherit",
            outline: "none", width: 180, maxWidth: "100%", boxSizing: "border-box",
            ...style,
          }}
        />
      </span>
    );
  }
  const display = value || placeholder || "+ add";
  return (
    <span
      onClick={e => { e.stopPropagation(); setEditing(true); }}
      title="Click to edit"
      style={{
        color: value ? "#64748b" : "#3a4250",
        fontSize: 11, cursor: "text",
        borderBottom: "1px dashed transparent",
        padding: "1px 0",
        fontStyle: value ? "normal" : "italic",
        ...style,
      }}
      onMouseEnter={e => e.currentTarget.style.borderBottomColor = "#2a303c"}
      onMouseLeave={e => e.currentTarget.style.borderBottomColor = "transparent"}
    >{display}</span>
  );
}

// Inline editor for the (project, analysisGroup) pair on a channel.
// Click → expands to two stacked inputs (Project on top, Group below).
// Enter saves both; Escape cancels.
// - Group input has datalist suggestions of existing groups in that project
// - Project input has datalist suggestions of all existing projects
// - If you clear the project entirely, the group also gets cleared on save
function InlineProjectGroupEdit({ project, group, availableProjects, groupsByProject, onCommit }) {
  const [editing, setEditing] = React.useState(false);
  const [draftProject, setDraftProject] = React.useState(project || "");
  const [draftGroup, setDraftGroup] = React.useState(group || "");
  const projectInputRef = React.useRef(null);

  React.useEffect(() => {
    if (!editing) {
      setDraftProject(project || "");
      setDraftGroup(group || "");
    }
  }, [project, group, editing]);

  React.useEffect(() => {
    if (editing && projectInputRef.current) {
      projectInputRef.current.focus();
      projectInputRef.current.select();
    }
  }, [editing]);

  const commit = () => {
    const nextProject = draftProject.trim() || null;
    // If project is cleared, group must also be cleared (group requires project)
    const nextGroup = nextProject ? (draftGroup.trim() || null) : null;
    setEditing(false);
    if ((project || null) !== nextProject || (group || null) !== nextGroup) {
      onCommit(nextProject, nextGroup);
    }
  };
  const cancel = () => {
    setDraftProject(project || "");
    setDraftGroup(group || "");
    setEditing(false);
  };

  const projectListId = "projects-datalist";
  // Per-project group datalist; we generate a unique id since multiple rows may render
  const groupListId = "groups-for-" + (draftProject || "_").replace(/[^A-Za-z0-9_-]/g, "_");
  const suggestionsForCurrentProject = (groupsByProject && groupsByProject[draftProject]) || [];

  if (editing) {
    return (
      <div onClick={e => e.stopPropagation()} style={{ display: "flex", flexDirection: "column", gap: 3, maxWidth: 220 }}>
        <input
          ref={projectInputRef}
          value={draftProject}
          onChange={e => {
            const v = e.target.value;
            setDraftProject(v);
            // If the user types a project that has no groups, clear draftGroup
            // to avoid carrying over a group that doesn't belong.
            if (groupsByProject && !groupsByProject[v]) {
              // don't clear automatically — let them type a new group too
            }
          }}
          onKeyDown={e => {
            if (e.key === "Enter") { e.preventDefault(); commit(); }
            else if (e.key === "Escape") { e.preventDefault(); cancel(); }
            else if (e.key === "Tab" && !e.shiftKey) {
              // let Tab move to the group field naturally
            }
          }}
          list={projectListId}
          placeholder="Project"
          style={{
            background: "#0c0f14", border: "1px solid #2dd4bf", borderRadius: 3,
            color: "#e2e6ed", padding: "1px 5px", fontSize: 11, fontFamily: "inherit",
            outline: "none", width: 180, maxWidth: "100%", boxSizing: "border-box",
          }}
        />
        <input
          value={draftGroup}
          onChange={e => setDraftGroup(e.target.value)}
          onBlur={() => {
            // commit when focus leaves the second input (the popover closes)
            // we wait a tick in case the click is on the project input
            setTimeout(() => {
              if (document.activeElement !== projectInputRef.current) commit();
            }, 0);
          }}
          onKeyDown={e => {
            if (e.key === "Enter") { e.preventDefault(); commit(); }
            else if (e.key === "Escape") { e.preventDefault(); cancel(); }
          }}
          list={groupListId}
          placeholder="Group (optional)"
          disabled={!draftProject.trim()}
          style={{
            background: "#0c0f14",
            border: "1px solid " + (draftProject.trim() ? "#2a303c" : "#1a1f27"),
            borderRadius: 3,
            color: draftProject.trim() ? "#e2e6ed" : "#3a4250",
            padding: "1px 5px", fontSize: 11, fontFamily: "inherit",
            outline: "none", width: 180, maxWidth: "100%", boxSizing: "border-box",
            cursor: draftProject.trim() ? "text" : "not-allowed",
          }}
        />
        <datalist id={projectListId}>
          {(availableProjects || []).map(p => <option key={p} value={p} />)}
        </datalist>
        <datalist id={groupListId}>
          {suggestionsForCurrentProject.map(g => <option key={g} value={g} />)}
        </datalist>
      </div>
    );
  }

  // Display mode
  const hasProject = !!project;
  const hasGroup = !!group;
  return (
    <span
      onClick={e => { e.stopPropagation(); setEditing(true); }}
      title="Click to edit project & group"
      style={{
        color: hasProject ? "#64748b" : "#3a4250",
        fontSize: 11, cursor: "text",
        borderBottom: "1px dashed transparent",
        padding: "1px 0",
        fontStyle: hasProject ? "normal" : "italic",
        display: "inline-block",
      }}
      onMouseEnter={e => e.currentTarget.style.borderBottomColor = "#2a303c"}
      onMouseLeave={e => e.currentTarget.style.borderBottomColor = "transparent"}
    >
      {!hasProject && "+ add project"}
      {hasProject && project}
      {hasProject && hasGroup && <span style={{ color: "#3a4250", margin: "0 4px" }}>·</span>}
      {hasProject && hasGroup && <span style={{ color: "#8891a0" }}>{group}</span>}
    </span>
  );
}

// ─── Main App ───
function App() {
  const [tab, setTab] = React.useState("schedule");
  const [data, setData] = React.useState(null);
  const [loading, setLoading] = React.useState(true);
  const [editModal, setEditModal] = React.useState(null);
  const [rptModal, setRptModal] = React.useState(null);
  const [settingsOpen, setSettingsOpen] = React.useState(false);
  const [expandedChambers, setExpandedChambers] = React.useState(new Set());
  const [lastSynced, setLastSynced] = React.useState(null);
  const [scope, setScope] = React.useState("all"); // "all" | "standard" | "rpt" | "formation"
  const [tempFilter, setTempFilter] = React.useState("all"); // "all" | "25°C" | "45°C" | "60°C" | "70°C"
  const [occupiedFilter, setOccupiedFilter] = React.useState("all"); // "all" | "occupied" | "empty"
  const [projectFilter, setProjectFilter] = React.useState("all"); // "all" | "__unassigned__" | <project name>
  const [groupFilter, setGroupFilter] = React.useState("all"); // "all" | "__nogroup__" | <group name>
  const [viewMode, setViewMode] = React.useState("stable"); // "stable" | "live"

  const anyModalOpen = editModal || rptModal || settingsOpen;

  // Load on mount
  React.useEffect(() => {
    (async () => {
      let stored = await loadData(viewMode);
      // Re-seed if no stored data, or if stored data has no RPT cells (upgrade from v1)
      if (!stored || !stored.rptCells || stored.rptCells.length === 0) {
        stored = JSON.parse(JSON.stringify(SEED_DATA));
        await saveData(stored);
      }
      // Ensure rptCells exists
      if (!stored.rptCells) stored.rptCells = [];
      if (!stored.rptSettings) stored.rptSettings = { durationDays: 4, restDays: 28 };
      setData(stored);
      setLastSynced(new Date());
      // Auto-expand chambers with occupied cells
      const expanded = new Set();
      stored.chambers.forEach(c => {
        if (c.channels.some(ch => ch.cellId)) expanded.add(c.name);
      });
      setExpandedChambers(expanded);
      setLoading(false);
    })();
    // eslint-disable-next-line react-hooks/exhaustive-deps
  }, []);

  // Refetch when view mode changes
  React.useEffect(() => {
    if (loading) return;
    (async () => {
      const fresh = await loadData(viewMode);
      if (fresh && fresh.rptCells) {
        setData(fresh);
        setLastSynced(new Date());
      }
    })();
    // eslint-disable-next-line react-hooks/exhaustive-deps
  }, [viewMode]);

  // Auto-refresh every 10 seconds (skip if modal is open)
  React.useEffect(() => {
    const interval = setInterval(async () => {
      if (anyModalOpen) return;
      try {
        const fresh = await loadData(viewMode);
        if (fresh && fresh.rptCells) {
          setData(fresh);
          setLastSynced(new Date());
        }
      } catch (e) { /* silent fail on background refresh */ }
    }, 10000);
    return () => clearInterval(interval);
  }, [anyModalOpen, viewMode]);

  // Refresh right after closing a modal
  const closeModalAndSync = React.useCallback(async (setter) => {
    setter(null);
    try {
      const fresh = await loadData(viewMode);
      if (fresh && fresh.rptCells) {
        setData(fresh);
        setLastSynced(new Date());
      }
    } catch (e) { /* silent */ }
  }, [viewMode]);

  const persist = React.useCallback(async (newData) => {
    setData(newData);
    await saveData(newData);
    setLastSynced(new Date());
  }, []);

  // Restore an archived cell back to the planner.
  const handleUnarchive = React.useCallback(async (cellId) => {
    try {
      const r = await fetch("/api/unarchive", {
        method: "POST", headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ cellId }),
      });
      const j = await r.json();
      if (j && j.data) { setData(j.data); setLastSynced(new Date()); }
      else window.alert("Restore failed: " + ((j && j.error) || "unknown error"));
    } catch (e) { window.alert("Restore failed (is the server running the latest code?)"); }
  }, []);

  const syncAgo = lastSynced ? Math.round((Date.now() - lastSynced.getTime()) / 1000) : null;

  // ─── Computed Stats ───
  const scopeFilter = React.useCallback((c) => {
    if (scope !== "all") {
      const cat = getChamberCategory(c);
      if (scope === "standard" && cat !== "Standard Testing") return false;
      if (scope === "rpt" && cat !== "RPT") return false;
      if (scope === "formation" && cat !== "Formation") return false;
    }
    if (tempFilter !== "all" && c.temp !== tempFilter) return false;
    return true;
  }, [scope, tempFilter]);

  // Auto-derived list of all distinct project values currently in use,
  // sorted alphabetically. Also: for each project, the set of distinct
  // sub-group values present.
  const { availableProjects, groupsByProject } = React.useMemo(() => {
    if (!data) return { availableProjects: [], groupsByProject: {} };
    const projectSet = new Set();
    const groupsMap = {}; // project -> Set of groups
    data.chambers.forEach(c => {
      c.channels.forEach(ch => {
        if (!ch.cellId) return;
        if (ch.project) {
          projectSet.add(ch.project);
          if (ch.analysisGroup) {
            if (!groupsMap[ch.project]) groupsMap[ch.project] = new Set();
            groupsMap[ch.project].add(ch.analysisGroup);
          }
        }
      });
    });
    const projects = Array.from(projectSet).sort((a, b) => a.localeCompare(b));
    const groupsByProject = {};
    Object.keys(groupsMap).forEach(p => {
      groupsByProject[p] = Array.from(groupsMap[p]).sort((a, b) => a.localeCompare(b));
    });
    return { availableProjects: projects, groupsByProject };
  }, [data]);

  // If projectFilter changes to something without sub-groups, reset groupFilter.
  React.useEffect(() => {
    if (projectFilter === "all" || projectFilter === "__unassigned__") {
      setGroupFilter("all");
    } else if (!groupsByProject[projectFilter]) {
      setGroupFilter("all");
    }
  }, [projectFilter, groupsByProject]);

  const stats = React.useMemo(() => {
    if (!data) return {};
    let total = 0, occupied = 0, groups = new Set();
    let sTotal = 0, sOccupied = 0, sGroups = new Set();
    data.chambers.forEach(c => {
      const inScope = scopeFilter(c);
      c.channels.forEach(ch => {
        total++;
        if (ch.cellId) { occupied++; if (ch.analysisGroup) groups.add(ch.analysisGroup); }
        if (inScope) {
          sTotal++;
          if (ch.cellId) { sOccupied++; if (ch.analysisGroup) sGroups.add(ch.analysisGroup); }
        }
      });
    });
    const allRptSorted = (data.rptCells || []).filter(r => r.nextRptStart)
      .sort((a, b) => a.nextRptStart.localeCompare(b.nextRptStart));
    const rptDur = data.rptSettings?.durationDays || 4;
    const todayStr = today();
    let rptActive = 0, rptStorage = 0;
    (data.rptCells || []).forEach(r => {
      if (r.nextRptStart) {
        const dToStart = daysBetween(todayStr, r.nextRptStart);
        const dToEnd = daysBetween(todayStr, addDays(r.nextRptStart, rptDur));
        if (dToStart <= 0 && dToEnd >= 0) rptActive++;
        else rptStorage++;
      } else { rptStorage++; }
    });
    const urgentCount = allRptSorted.filter(r => {
      const d = daysBetween(today(), r.nextRptStart);
      return d >= -1 && d <= 14;
    }).length;
    return {
      total, occupied, available: total - occupied, util: total ? ((occupied / total) * 100).toFixed(1) : 0, groups: groups.size,
      rptCount: (data.rptCells || []).length, allRptSorted, urgentCount, rptActive, rptStorage,
      sTotal, sOccupied, sAvailable: sTotal - sOccupied, sUtil: sTotal ? ((sOccupied / sTotal) * 100).toFixed(1) : 0, sGroups: sGroups.size,
    };
  }, [data, scopeFilter]);

  if (loading) return <div style={{ display: "flex", alignItems: "center", justifyContent: "center", height: "100vh", background: "#0c0f14", color: "#8891a0", fontFamily: "system-ui" }}>Loading lab data...</div>;

  const toggleChamber = (name) => {
    setExpandedChambers(prev => {
      const s = new Set(prev);
      s.has(name) ? s.delete(name) : s.add(name);
      return s;
    });
  };

  // ─── Channel Edit ───
  const handleSaveChannel = async (chamberIdx, channelIdx, updates) => {
    const nd = JSON.parse(JSON.stringify(data));
    const chamberName = nd.chambers[chamberIdx].name;
    const isAuto = isAutoSyncChamber(chamberName);
    if (isAuto) {
      // On auto-sync chambers, only persist user-metadata fields.
      // cellId / currentTest / startDate are owned by the watcher.
      const allowed = {};
      if ("project" in updates) allowed.project = updates.project;
      if ("analysisGroup" in updates) allowed.analysisGroup = updates.analysisGroup;
      if ("cellFormat" in updates) allowed.cellFormat = updates.cellFormat;
      if ("durationWeeks" in updates) allowed.durationWeeks = updates.durationWeeks;
      if ("purpose" in updates) allowed.purpose = updates.purpose;
      Object.assign(nd.chambers[chamberIdx].channels[channelIdx], allowed);
    } else {
      Object.assign(nd.chambers[chamberIdx].channels[channelIdx], updates);
      if (updates.currentTest === "CLEAR" || !updates.cellId) {
        nd.chambers[chamberIdx].channels[channelIdx] = {
          ...nd.chambers[chamberIdx].channels[channelIdx],
          cellId: null, project: null, analysisGroup: null, cellFormat: null, currentTest: null, durationWeeks: null, startDate: null
        };
      }
    }
    await persist(nd);
    setEditModal(null);
  };

  // ─── Quick Clear Channel ───
  const handleQuickClear = async (chamberIdx, channelIdx) => {
    const nd = JSON.parse(JSON.stringify(data));
    const chamberName = nd.chambers[chamberIdx].name;
    if (isAutoSyncChamber(chamberName)) {
      // Don't allow manual clears on auto-sync chambers — the watcher decides.
      // We only clear the user-editable metadata.
      const ch = nd.chambers[chamberIdx].channels[channelIdx];
      Object.assign(ch, { project: null, analysisGroup: null, cellFormat: null, durationWeeks: null });
      await persist(nd);
      return;
    }
    const ch = nd.chambers[chamberIdx].channels[channelIdx];
    Object.assign(ch, { cellId: null, project: null, analysisGroup: null, cellFormat: null, currentTest: null, durationWeeks: null, startDate: null });
    await persist(nd);
  };

  // ─── RPT Management ───
  const handleAddRpt = async (rptEntry) => {
    const nd = JSON.parse(JSON.stringify(data));
    nd.rptCells.push(rptEntry);
    await persist(nd);
    setRptModal(null);
  };

  const handleDeleteRpt = async (idx) => {
    const nd = JSON.parse(JSON.stringify(data));
    nd.rptCells.splice(idx, 1);
    await persist(nd);
  };

  const handleLogRptEvent = async (rptIdx, field, value) => {
    const nd = JSON.parse(JSON.stringify(data));
    nd.rptCells[rptIdx][field] = value;
    // Auto-compute next RPT
    const cell = nd.rptCells[rptIdx];
    const events = cell.events || [];
    if (field === "events") {
      // Recalculate nextRptStart
      if (events.length > 0) {
        const lastReturn = events[events.length - 1].returned;
        if (lastReturn) {
          cell.nextRptStart = addDays(lastReturn, nd.rptSettings.restDays);
        }
      }
    }
    nd.rptCells[rptIdx] = cell;
    await persist(nd);
  };

  const handleSaveSettings = async (settings) => {
    const nd = JSON.parse(JSON.stringify(data));
    nd.rptSettings = settings;
    await persist(nd);
    setSettingsOpen(false);
  };

  const handleResetData = async () => {
    const fresh = JSON.parse(JSON.stringify(SEED_DATA));
    await persist(fresh);
    const expanded = new Set();
    fresh.chambers.forEach(c => { if (c.channels.some(ch => ch.cellId)) expanded.add(c.name); });
    setExpandedChambers(expanded);
  };

  return (
    <div style={{ fontFamily: "'DM Sans', system-ui, sans-serif", background: "#0c0f14", color: "#e2e6ed", minHeight: "100vh" }}>
      <style>{`
        .rpt-scroll::-webkit-scrollbar { width: 6px; height: 6px; }
        .rpt-scroll::-webkit-scrollbar-track { background: transparent; }
        .rpt-scroll::-webkit-scrollbar-thumb { background: rgba(167,139,250,0.25); border-radius: 3px; }
        .rpt-scroll::-webkit-scrollbar-thumb:hover { background: rgba(167,139,250,0.45); }
        .rpt-scroll { scrollbar-width: thin; scrollbar-color: rgba(167,139,250,0.25) transparent; }
      `}</style>
      {/* ─── Header ─── */}
      <div style={{ borderBottom: "1px solid #2a303c", padding: "16px 24px", display: "flex", alignItems: "center", justifyContent: "space-between", position: "sticky", top: 0, background: "#0c0f14", zIndex: 100 }}>
        <div>
          <div style={{ fontSize: 18, fontWeight: 600 }}><span style={{ color: "#4e9af5" }}>Cell R&D</span> Lab Cycler Manager</div>
          <div style={{ fontSize: 11, color: "#8891a0", marginTop: 2, display: "flex", alignItems: "center", gap: 8 }}>
            <span style={{ color: "#34d399", fontSize: 10 }}>●</span>
            <WatcherBadge viewMode={viewMode} setViewMode={setViewMode} />
            <SyncTimer lastSynced={lastSynced} />
          </div>
        </div>
        <div style={{ display: "flex", gap: 4, alignItems: "center" }}>
          {[["schedule", "Active"], ["rpt", "RPT Planner"], ["archive", "Archive"]].map(([key, label]) => (
            <button key={key} onClick={() => setTab(key)} style={{
              padding: "6px 16px", borderRadius: 6, border: "1px solid " + (tab === key ? "#4e9af5" : "#2a303c"),
              background: tab === key ? "rgba(78,154,245,0.15)" : "transparent", color: tab === key ? "#4e9af5" : "#8891a0",
              cursor: "pointer", fontSize: 13, fontWeight: 500, fontFamily: "inherit"
            }}>{label}</button>
          ))}
          <button onClick={() => setSettingsOpen(true)} style={{ padding: "6px 12px", borderRadius: 6, border: "1px solid #2a303c", background: "transparent", color: "#8891a0", cursor: "pointer", fontSize: 13, fontFamily: "inherit" }}>⚙</button>
        </div>
      </div>

      {/* ─── Filter Strip (Active tab only; RPT Planner / Archive have no filters) ─── */}
      {tab === "schedule" && (
      <div style={{ padding: "12px 24px 4px", display: "flex", alignItems: "center", gap: 6, flexWrap: "wrap" }}>
        {tab !== "rpt" && (<>
          <span style={{ fontSize: 10, fontWeight: 600, textTransform: "uppercase", letterSpacing: "0.5px", color: "#64748b", marginRight: 4 }}>Scope:</span>
          {[["all", "All"], ["standard", "Standard"], ["rpt", "RPT"], ["formation", "Formation"]].map(([key, label]) => (
            <button key={key} onClick={() => setScope(key)} style={{
              padding: "3px 10px", borderRadius: 4, border: "1px solid " + (scope === key ? "#4e9af5" : "#2a303c"),
              background: scope === key ? "rgba(78,154,245,0.12)" : "transparent",
              color: scope === key ? "#4e9af5" : "#64748b",
              cursor: "pointer", fontSize: 11, fontWeight: 500, fontFamily: "inherit"
            }}>{label}</button>
          ))}
          <span style={{ color: "#2a303c", margin: "0 4px" }}>│</span>
        </>)}
        <span style={{ fontSize: 10, fontWeight: 600, textTransform: "uppercase", letterSpacing: "0.5px", color: "#64748b", marginRight: 4 }}>Temp:</span>
        {[["all", "All"], ["25°C", "25°C"], ["45°C", "45°C"], ["60°C", "60°C"], ["70°C", "70°C"]].map(([key, label]) => (
          <button key={key} onClick={() => setTempFilter(key)} style={{
            padding: "3px 10px", borderRadius: 4, border: "1px solid " + (tempFilter === key ? tempColor(key === "all" ? null : key) || "#4e9af5" : "#2a303c"),
            background: tempFilter === key ? (tempColor(key === "all" ? null : key) || "#4e9af5") + "1f" : "transparent",
            color: tempFilter === key ? tempColor(key === "all" ? null : key) || "#4e9af5" : "#64748b",
            cursor: "pointer", fontSize: 11, fontWeight: 500, fontFamily: "inherit"
          }}>{label}</button>
        ))}
        {tab === "schedule" && (
          <>
            <span style={{ color: "#2a303c", margin: "0 4px" }}>│</span>
            <span style={{ fontSize: 10, fontWeight: 600, textTransform: "uppercase", letterSpacing: "0.5px", color: "#64748b", marginRight: 4 }}>Show:</span>
            {[["all", "All"], ["occupied", "Occupied"], ["empty", "Empty"]].map(([key, label]) => {
              const active = occupiedFilter === key;
              const accent = key === "empty" ? "#64748b" : key === "occupied" ? "#4e9af5" : "#8891a0";
              return (
                <button key={key} onClick={() => setOccupiedFilter(key)} style={{
                  padding: "3px 10px", borderRadius: 4,
                  border: "1px solid " + (active ? accent : "#2a303c"),
                  background: active ? accent + "1f" : "transparent",
                  color: active ? accent : "#64748b",
                  cursor: "pointer", fontSize: 11, fontWeight: 500, fontFamily: "inherit"
                }}>{label}</button>
              );
            })}
            <span style={{ color: "#2a303c", margin: "0 4px" }}>│</span>
            <span style={{ fontSize: 10, fontWeight: 600, textTransform: "uppercase", letterSpacing: "0.5px", color: "#64748b", marginRight: 4 }}>Project:</span>
            <select
              value={projectFilter}
              onChange={e => setProjectFilter(e.target.value)}
              style={{
                padding: "3px 8px", borderRadius: 4,
                border: "1px solid " + (projectFilter !== "all" ? "#4e9af5" : "#2a303c"),
                background: projectFilter !== "all" ? "rgba(78,154,245,0.12)" : "#0c0f14",
                color: projectFilter !== "all" ? "#4e9af5" : "#8891a0",
                cursor: "pointer", fontSize: 11, fontWeight: 500, fontFamily: "inherit",
                outline: "none", minWidth: 140, maxWidth: 240,
              }}>
              <option value="all">All</option>
              <option value="__unassigned__">(Unassigned)</option>
              {availableProjects.length > 0 && <option disabled>──────────</option>}
              {availableProjects.map(p => (
                <option key={p} value={p}>{p}</option>
              ))}
            </select>
            {projectFilter !== "all" && projectFilter !== "__unassigned__" && groupsByProject[projectFilter] && (
              <>
                <span style={{ fontSize: 10, fontWeight: 600, textTransform: "uppercase", letterSpacing: "0.5px", color: "#64748b", margin: "0 4px" }}>Group:</span>
                <select
                  value={groupFilter}
                  onChange={e => setGroupFilter(e.target.value)}
                  style={{
                    padding: "3px 8px", borderRadius: 4,
                    border: "1px solid " + (groupFilter !== "all" ? "#4e9af5" : "#2a303c"),
                    background: groupFilter !== "all" ? "rgba(78,154,245,0.12)" : "#0c0f14",
                    color: groupFilter !== "all" ? "#4e9af5" : "#8891a0",
                    cursor: "pointer", fontSize: 11, fontWeight: 500, fontFamily: "inherit",
                    outline: "none", minWidth: 110, maxWidth: 200,
                  }}>
                  <option value="all">All in project</option>
                  <option value="__nogroup__">(No group)</option>
                  <option disabled>──────────</option>
                  {groupsByProject[projectFilter].map(g => (
                    <option key={g} value={g}>{g}</option>
                  ))}
                </select>
              </>
            )}
            {(projectFilter !== "all" || groupFilter !== "all") && (
              <button
                onClick={() => { setProjectFilter("all"); setGroupFilter("all"); }}
                title="Clear project/group filter"
                style={{
                  padding: "3px 7px", borderRadius: 4, border: "1px solid #2a303c",
                  background: "transparent", color: "#64748b",
                  cursor: "pointer", fontSize: 11, fontFamily: "inherit",
                }}>×</button>
            )}
          </>
        )}
      </div>
      )}

      {/* ─── Tab Content ─── */}
      <div style={{ padding: "0 24px 24px" }}>
        {tab === "schedule" && (
          <ScheduleTab data={data} stats={stats} expandedChambers={expandedChambers} setExpandedChambers={setExpandedChambers} toggleChamber={toggleChamber} onEditChannel={(ci, chi) => setEditModal({ chamberIdx: ci, channelIdx: chi })} onQuickClear={handleQuickClear} scopeFilter={scopeFilter} persist={persist} projectFilter={projectFilter} groupFilter={groupFilter} occupiedFilter={occupiedFilter} availableProjects={availableProjects} groupsByProject={groupsByProject} viewMode={viewMode} setViewMode={setViewMode} />
        )}
        {tab === "rpt" && (
          <RptTab data={data} stats={stats} onAdd={() => setRptModal(true)} onDelete={handleDeleteRpt} onLogEvent={handleLogRptEvent} persist={persist} tempFilter={tempFilter} />
        )}
        {tab === "archive" && (
          <ArchiveTab data={data} onUnarchive={handleUnarchive} />
        )}
      </div>

      {/* ─── Edit Channel Modal ─── */}
      {editModal && (
        <ChannelModal data={data} chamberIdx={editModal.chamberIdx} channelIdx={editModal.channelIdx} onSave={handleSaveChannel} onClose={() => closeModalAndSync(setEditModal)} />
      )}

      {/* ─── Add RPT Modal ─── */}
      {rptModal && (
        <RptAddModal data={data} onAdd={handleAddRpt} onClose={() => closeModalAndSync(setRptModal)} />
      )}

      {/* ─── Settings Modal ─── */}
      {settingsOpen && (
        <SettingsModal data={data} onSave={handleSaveSettings} onClose={() => { setSettingsOpen(false); closeModalAndSync(() => {}); }} onReset={handleResetData} />
      )}
    </div>
  );
}

// ═══════════════════════════════════════════════════
// SCHEDULE TAB
// ═══════════════════════════════════════════════════
function ScheduleTab({ data, stats, expandedChambers, setExpandedChambers, toggleChamber, onEditChannel, onQuickClear, scopeFilter, persist, projectFilter, groupFilter, occupiedFilter, availableProjects, groupsByProject, viewMode, setViewMode }) {
  const [search, setSearch] = React.useState("");
  const q = search.toLowerCase().trim();

  // Predicate: does a channel match the active filters?
  //   occupiedFilter="occupied"      → only channels with a cellId
  //   occupiedFilter="empty"         → only channels without a cellId
  //   projectFilter="all"            → no project narrowing
  //   projectFilter="__unassigned__" → only rows with a cell and no project
  //   projectFilter=<name>           → only rows in that project, narrowed
  //                                    further by groupFilter if set
  const channelMatch = React.useCallback((ch) => {
    // Occupancy filter first
    if (occupiedFilter === "occupied" && !ch.cellId) return false;
    if (occupiedFilter === "empty" && ch.cellId) return false;
    // Project/group filter
    if (projectFilter === "all") return true;
    if (!ch.cellId) return false;
    if (projectFilter === "__unassigned__") return !ch.project;
    if (ch.project !== projectFilter) return false;
    if (groupFilter === "all") return true;
    if (groupFilter === "__nogroup__") return !ch.analysisGroup;
    return ch.analysisGroup === groupFilter;
  }, [projectFilter, groupFilter, occupiedFilter]);

  // Whether any non-default filter is active. Used to decide whether to
  // collapse chambers that have no matching channels.
  const filterActive = projectFilter !== "all" || occupiedFilter !== "all";

  // Filter chambers by scope, then by all active filters (hide chambers with no matching channels)
  const visibleChambers = React.useMemo(() => {
    return data.chambers
      .map((c, ci) => ({ ...c, _idx: ci }))
      .filter(c => scopeFilter(c))
      .filter(c => !filterActive || c.channels.some(channelMatch));
  }, [data, scopeFilter, filterActive, channelMatch]);

  // When a filter changes to something non-trivial, auto-expand all
  // visible chambers so the user immediately sees the matching cells.
  React.useEffect(() => {
    if (filterActive) {
      setExpandedChambers(new Set(visibleChambers.map(c => c.name)));
    }
    // eslint-disable-next-line react-hooks/exhaustive-deps
  }, [projectFilter, groupFilter, occupiedFilter]);

  // ─── View Diff (stable vs live) ───
  // When at least one folder is updating, fetch the *other* view so we can
  // compare which cells are in one view but not the other. The drawer is
  // collapsible and only shown when there's something to diff.
  const [otherViewData, setOtherViewData] = React.useState(null);
  const [diffExpanded, setDiffExpanded] = React.useState(false);
  const [watcherStatus, setWatcherStatus] = React.useState(null);

  React.useEffect(() => {
    let alive = true;
    const tick = async () => {
      try {
        const r = await fetch("/api/watcher", { cache: "no-store" });
        if (alive && r.ok) setWatcherStatus(await r.json());
      } catch (e) { /* silent */ }
    };
    tick();
    const id = setInterval(tick, 10000);
    return () => { alive = false; clearInterval(id); };
  }, []);

  const anyUpdating = !!(watcherStatus && watcherStatus.any_folder_updating);

  // Re-fetch the "other view" whenever update state changes, when our view
  // changes, or periodically while updating.
  React.useEffect(() => {
    if (!anyUpdating) { setOtherViewData(null); return; }
    const otherView = viewMode === "stable" ? "live" : "stable";
    let alive = true;
    const fetchOther = async () => {
      try {
        const url = otherView === "stable" ? "/api/data?view=stable" : "/api/data?view=live";
        const r = await fetch(url, { cache: "no-store" });
        if (alive && r.ok) setOtherViewData(await r.json());
      } catch (e) { /* silent */ }
    };
    fetchOther();
    const id = setInterval(fetchOther, 10000);
    return () => { alive = false; clearInterval(id); };
  }, [anyUpdating, viewMode]);

  // Compute the diff: cells in current view's channels vs. other view's channels.
  // We index each side by channelId so we can compare per-channel.
  const diff = React.useMemo(() => {
    if (!anyUpdating || !otherViewData) return null;
    const collect = (d) => {
      const map = new Map();
      d.chambers.forEach(c => {
        c.channels.forEach(ch => {
          if (ch.cellId) map.set(ch.channelId, { cellId: ch.cellId, project: ch.project, group: ch.analysisGroup, chamber: c.name, channelNum: ch.number, temp: c.temp });
        });
      });
      return map;
    };
    const cur = collect(data);
    const other = collect(otherViewData);
    // "Only in current view" = channels with a cell here, but a different (or no) cell there
    const onlyHere = [];
    cur.forEach((v, channelId) => {
      const o = other.get(channelId);
      if (!o || o.cellId !== v.cellId) onlyHere.push({ ...v, channelId });
    });
    const onlyThere = [];
    other.forEach((v, channelId) => {
      const c = cur.get(channelId);
      if (!c || c.cellId !== v.cellId) onlyThere.push({ ...v, channelId });
    });
    return { onlyHere, onlyThere };
  }, [anyUpdating, otherViewData, data]);

  const allExpanded = visibleChambers.length > 0 && visibleChambers.every(c => expandedChambers.has(c.name));
  const toggleAll = () => {
    if (allExpanded) {
      setExpandedChambers(new Set());
    } else {
      setExpandedChambers(new Set(visibleChambers.map(c => c.name)));
    }
  };

  // When searching, find matching channels and auto-show them
  const searchResults = React.useMemo(() => {
    if (q.length < 2) return null;
    const results = [];
    data.chambers.forEach((c, ci) => {
      c.channels.forEach((ch, chi) => {
        if (ch.cellId && ch.cellId.toLowerCase().includes(q)) {
          results.push({ chamberIdx: ci, channelIdx: chi, cellId: ch.cellId, chamber: c.name, temp: c.temp, category: getChamberCategory(c), channelNum: ch.number, channelId: ch.channelId, test: ch.currentTest, group: ch.analysisGroup });
        }
      });
    });
    return results;
  }, [q, data]);

  // Analysis groups for the summary strip
  const groupCounts = {};
  data.chambers.filter(scopeFilter).forEach(c => c.channels.forEach(ch => {
    if (ch.analysisGroup) groupCounts[ch.analysisGroup] = (groupCounts[ch.analysisGroup] || 0) + 1;
  }));
  const sortedGroups = Object.entries(groupCounts).sort((a, b) => b[1] - a[1]);

  return (
    <div>
      {/* Compact stats strip */}
      <div style={{ display: "flex", alignItems: "center", gap: 20, marginBottom: 14, padding: "10px 14px", background: "#151920", border: "1px solid #2a303c", borderRadius: 8, flexWrap: "wrap" }}>
        {[
          { label: "Active", value: stats.sOccupied, color: "#4e9af5" },
          { label: "Available", value: stats.sAvailable, color: "#34d399" },
          { label: "Util", value: stats.sUtil + "%", color: "#fbbf24" },
          { label: "Studies", value: stats.sGroups, color: "#a78bfa" },
        ].map(k => (
          <div key={k.label} style={{ display: "flex", alignItems: "baseline", gap: 6 }}>
            <span style={{ fontSize: 10, fontWeight: 600, textTransform: "uppercase", letterSpacing: "0.5px", color: "#64748b" }}>{k.label}</span>
            <span style={{ fontSize: 16, fontWeight: 600, color: k.color, fontFamily: "'JetBrains Mono', monospace" }}>{k.value}</span>
          </div>
        ))}
        {sortedGroups.length > 0 && (
          <div style={{ marginLeft: "auto", display: "flex", gap: 6, flexWrap: "wrap", justifyContent: "flex-end" }}>
            {sortedGroups.slice(0, 8).map(([name, count]) => (
              <span key={name} style={{ fontSize: 10, padding: "2px 7px", borderRadius: 10, background: "rgba(78,154,245,0.10)", border: "1px solid rgba(78,154,245,0.20)", color: "#8891a0" }}>
                {name} <span style={{ color: "#4e9af5", fontFamily: "'JetBrains Mono', monospace" }}>{count}</span>
              </span>
            ))}
          </div>
        )}
      </div>

      {/* Search bar */}
      <div style={{ marginBottom: 14, position: "relative" }}>
        <input
          placeholder="Search cell ID across all chambers..."
          value={search}
          onChange={e => setSearch(e.target.value)}
          style={{ width: "100%", padding: "10px 14px 10px 34px", borderRadius: 8, border: "1px solid #2a303c", background: "#151920", color: "#e2e6ed", fontSize: 13, fontFamily: "inherit", outline: "none" }}
        />
        <span style={{ position: "absolute", left: 12, top: "50%", transform: "translateY(-50%)", fontSize: 14, color: "#64748b", pointerEvents: "none" }}>⌕</span>
        {search && <span onClick={() => setSearch("")} style={{ position: "absolute", right: 12, top: "50%", transform: "translateY(-50%)", fontSize: 12, color: "#64748b", cursor: "pointer" }}>✕</span>}
      </div>

      {/* View diff drawer — only when updating + at least one cell differs */}
      {diff && (diff.onlyHere.length > 0 || diff.onlyThere.length > 0) && (
        <div style={{ marginBottom: 14, background: "rgba(251,191,36,0.04)", border: "1px solid rgba(251,191,36,0.30)", borderRadius: 8, overflow: "hidden" }}>
          <div
            onClick={() => setDiffExpanded(!diffExpanded)}
            style={{
              padding: "8px 14px", cursor: "pointer", display: "flex",
              alignItems: "center", justifyContent: "space-between", gap: 12,
              fontSize: 12,
            }}>
            <div style={{ display: "flex", alignItems: "center", gap: 10, color: "#fbbf24" }}>
              <span style={{ fontSize: 14 }}>{diffExpanded ? "▾" : "▸"}</span>
              <span style={{ fontWeight: 600 }}>View differences</span>
              <span style={{ color: "#a8a08b", fontSize: 11 }}>
                {viewMode === "stable" ? "stable" : "live"} vs {viewMode === "stable" ? "live" : "stable"}
              </span>
            </div>
            <div style={{ display: "flex", gap: 12, fontSize: 11, color: "#a8a08b", fontFamily: "'JetBrains Mono', monospace" }}>
              <span><span style={{ color: "#34d399" }}>+{diff.onlyHere.length}</span> only in {viewMode}</span>
              <span><span style={{ color: "#f87171" }}>−{diff.onlyThere.length}</span> only in {viewMode === "stable" ? "live" : "stable"}</span>
            </div>
          </div>
          {diffExpanded && (
            <div style={{ borderTop: "1px solid rgba(251,191,36,0.20)", padding: "10px 14px", display: "grid", gridTemplateColumns: "1fr 1fr", gap: 16 }}>
              <div>
                <div style={{ fontSize: 10, fontWeight: 600, textTransform: "uppercase", letterSpacing: "0.5px", color: "#34d399", marginBottom: 6 }}>
                  Only in {viewMode} view ({diff.onlyHere.length})
                </div>
                {diff.onlyHere.length === 0 && <div style={{ fontSize: 11, color: "#64748b", fontStyle: "italic" }}>none</div>}
                {diff.onlyHere.map((d, i) => {
                  // Find chamberIdx / channelIdx for click-jump
                  const ci = data.chambers.findIndex(c => c.name === d.chamber);
                  const chi = ci >= 0 ? data.chambers[ci].channels.findIndex(x => x.channelId === d.channelId) : -1;
                  return (
                    <div key={i}
                         onClick={() => { if (ci >= 0 && chi >= 0) onEditChannel(ci, chi); }}
                         style={{ padding: "4px 0", fontSize: 11, cursor: ci >= 0 ? "pointer" : "default", borderBottom: i < diff.onlyHere.length - 1 ? "1px solid #1a1f27" : "none" }}>
                      <span style={{ color: "#e2e6ed", fontWeight: 500 }}>{d.cellId}</span>
                      <span style={{ color: "#64748b", marginLeft: 6, fontFamily: "'JetBrains Mono', monospace" }}>{d.channelId}</span>
                      {d.project && <span style={{ color: "#8891a0", marginLeft: 6 }}>· {d.project}{d.group ? " / " + d.group : ""}</span>}
                    </div>
                  );
                })}
              </div>
              <div>
                <div style={{ fontSize: 10, fontWeight: 600, textTransform: "uppercase", letterSpacing: "0.5px", color: "#f87171", marginBottom: 6 }}>
                  Only in {viewMode === "stable" ? "live" : "stable"} view ({diff.onlyThere.length})
                </div>
                {diff.onlyThere.length === 0 && <div style={{ fontSize: 11, color: "#64748b", fontStyle: "italic" }}>none</div>}
                {diff.onlyThere.map((d, i) => (
                  <div key={i} style={{ padding: "4px 0", fontSize: 11, borderBottom: i < diff.onlyThere.length - 1 ? "1px solid #1a1f27" : "none" }}>
                    <span style={{ color: "#e2e6ed", fontWeight: 500 }}>{d.cellId}</span>
                    <span style={{ color: "#64748b", marginLeft: 6, fontFamily: "'JetBrains Mono', monospace" }}>{d.channelId}</span>
                    {d.project && <span style={{ color: "#8891a0", marginLeft: 6 }}>· {d.project}{d.group ? " / " + d.group : ""}</span>}
                  </div>
                ))}
              </div>
            </div>
          )}
        </div>
      )}

      {/* Search results */}
      {searchResults && (
        <div style={{ marginBottom: 16, background: "#151920", border: "1px solid #2a303c", borderRadius: 8, overflow: "hidden" }}>
          <div style={{ padding: "10px 14px", borderBottom: "1px solid #1e2530", fontSize: 12, color: "#8891a0" }}>
            {searchResults.length === 0 ? `No cells matching "${search}"` : `${searchResults.length} cell${searchResults.length !== 1 ? "s" : ""} found`}
          </div>
          {searchResults.map((r, i) => (
            <div key={i} onClick={() => onEditChannel(r.chamberIdx, r.channelIdx)} style={{
              padding: "10px 14px", borderBottom: "1px solid #1a1f27", cursor: "pointer", transition: "background 0.1s"
            }}
            onMouseEnter={e => e.currentTarget.style.background = "rgba(78,154,245,0.06)"}
            onMouseLeave={e => e.currentTarget.style.background = "transparent"}
            >
              <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center" }}>
                <div style={{ display: "flex", alignItems: "center", gap: 10 }}>
                  <span style={{ fontWeight: 600, fontSize: 13, color: "#e2e6ed" }}>{r.cellId}</span>
                  <span style={{ fontSize: 11, color: tempColor(r.temp) }}>{r.chamber} ({r.temp})</span>
                  <span style={{ fontSize: 11, color: "#64748b" }}>Ch {r.channelNum} · {r.channelId}</span>
                </div>
                <span style={{ fontSize: 10, padding: "2px 6px", borderRadius: 3, background: CATEGORY_COLORS[r.category] + "22", color: CATEGORY_COLORS[r.category], fontWeight: 600 }}>{r.category}</span>
              </div>
              {(r.test || r.group) && (
                <div style={{ fontSize: 11, color: "#64748b", marginTop: 3 }}>
                  {r.test}{r.test && r.group ? " · " : ""}{r.group}
                </div>
              )}
            </div>
          ))}
        </div>
      )}

      {/* Expand/Collapse All */}
      <div style={{ display: "flex", justifyContent: "flex-end", marginBottom: 8 }}>
        <button onClick={toggleAll} style={{
          padding: "4px 12px", borderRadius: 4, border: "1px solid #2a303c",
          background: "transparent", color: "#8891a0", cursor: "pointer", fontSize: 11, fontFamily: "inherit"
        }}>{allExpanded ? "▾ Collapse All" : "▸ Expand All"}</button>
      </div>

      {/* Chamber list */}
      {CATEGORY_ORDER.map(cat => {
        const catChambers = visibleChambers.filter(c => getChamberCategory(c) === cat);
        if (catChambers.length === 0) return null;
        const catOcc = catChambers.reduce((s, c) => s + c.channels.filter(ch => ch.cellId).length, 0);
        const catTotal = catChambers.reduce((s, c) => s + c.channels.length, 0);
        return (
          <div key={cat} style={{ marginBottom: 20 }}>
            <div style={{ display: "flex", alignItems: "center", gap: 10, marginBottom: 8, padding: "0 4px" }}>
              <span style={{ width: 8, height: 8, borderRadius: 2, background: CATEGORY_COLORS[cat] }} />
              <span style={{ fontSize: 13, fontWeight: 700, textTransform: "uppercase", letterSpacing: "0.5px", color: CATEGORY_COLORS[cat] }}>{cat}</span>
              <span style={{ fontSize: 11, color: "#64748b" }}>{catOcc}/{catTotal} channels occupied</span>
            </div>
            {catChambers.map(chamber => {
              const ci = chamber._idx;
              const occ = chamber.channels.filter(c => c.cellId).length;
              const total = chamber.channels.length;
              const isExpanded = expandedChambers.has(chamber.name);
              const utilPct = total ? (occ / total * 100) : 0;
              return (
                <div key={chamber.name} style={{ marginBottom: 6, background: "#151920", border: "1px solid #2a303c", borderRadius: 8, overflow: "hidden" }}>
                  <div onClick={() => toggleChamber(chamber.name)} style={{
                    padding: "12px 16px", cursor: "pointer", display: "flex", alignItems: "center", justifyContent: "space-between",
                    background: isExpanded ? "#1c2129" : "transparent", transition: "background 0.15s"
                  }}>
                    <div style={{ display: "flex", alignItems: "center", gap: 12 }}>
                      <span style={{ fontSize: 12, color: "#64748b", width: 16 }}>{isExpanded ? "▾" : "▸"}</span>
                      <span style={{ fontWeight: 600, fontSize: 14 }}>{chamber.name}</span>
                      {isAutoSyncChamber(chamber.name) && (
                        <span title="Cell ID, test, and start date are auto-detected from Neware filenames" style={{
                          fontSize: 10, fontWeight: 600, padding: "2px 7px", borderRadius: 999,
                          background: "rgba(45,212,191,0.12)", color: "#2dd4bf",
                          border: "1px solid rgba(45,212,191,0.35)", letterSpacing: "0.4px",
                          textTransform: "uppercase", fontFamily: "'JetBrains Mono', monospace"
                        }}>⟲ Auto</span>
                      )}
                      <ChamberTempChip chamberIdx={ci} temp={chamber.temp} data={data} persist={persist} />
                    </div>
                    <div style={{ display: "flex", alignItems: "center", gap: 16 }}>
                      <div style={{ display: "flex", alignItems: "center", gap: 8 }}>
                        <div style={{ width: 120, height: 6, background: "#0c0f14", borderRadius: 3, overflow: "hidden" }}>
                          <div style={{ width: utilPct + "%", height: "100%", background: occ > 0 ? CATEGORY_COLORS[cat] : "transparent", borderRadius: 3, transition: "width 0.3s" }} />
                        </div>
                        <span style={{ fontSize: 12, color: "#8891a0", fontFamily: "'JetBrains Mono', monospace", minWidth: 60, textAlign: "right" }}>
                          {occ}/{total}
                        </span>
                      </div>
                    </div>
                  </div>
                  {isExpanded && (
                    <div style={{ padding: "0 8px 8px" }}>
                      {(() => {
                        const SHELF_SIZE = 6;
                        const shelves = [];
                        for (let s = 0; s < Math.ceil(chamber.channels.length / SHELF_SIZE); s++) {
                          shelves.push(chamber.channels.slice(s * SHELF_SIZE, (s + 1) * SHELF_SIZE));
                        }
                        return shelves.map((shelfChannels, si) => {
                          // Apply all active filters to this shelf's channels.
                          // If filter hides every channel in the shelf, skip the shelf entirely.
                          const visibleShelfChannels = filterActive
                            ? shelfChannels.filter(channelMatch)
                            : shelfChannels;
                          if (visibleShelfChannels.length === 0) return null;
                          const shelfOcc = shelfChannels.filter(ch => ch.cellId).length;
                          const shelfTotal = shelfChannels.length;
                          return (
                            <div key={si} style={{ marginBottom: si < shelves.length - 1 ? 6 : 0 }}>
                              <div style={{ display: "flex", alignItems: "center", gap: 8, padding: "6px 8px 4px", borderBottom: "1px solid #1e2530" }}>
                                <span style={{ fontSize: 11, fontWeight: 700, color: "#8891a0", letterSpacing: "0.3px" }}>Shelf {si + 1}</span>
                                <span style={{ fontSize: 10, color: "#64748b", fontFamily: "'JetBrains Mono', monospace" }}>{shelfOcc}/{shelfTotal}{filterActive && visibleShelfChannels.length < shelfTotal ? ` · ${visibleShelfChannels.length} match` : ""}</span>
                                <div style={{ width: 48, height: 4, background: "#0c0f14", borderRadius: 2, overflow: "hidden" }}>
                                  <div style={{ width: (shelfTotal ? shelfOcc / shelfTotal * 100 : 0) + "%", height: "100%", background: shelfOcc > 0 ? CATEGORY_COLORS[getChamberCategory(chamber)] : "transparent", borderRadius: 2 }} />
                                </div>
                              </div>
                              <div style={{ display: "grid", gridTemplateColumns: "40px 120px 1fr 100px 80px 100px 60px", gap: 0, padding: "3px 8px 2px", fontSize: 10, fontWeight: 600, textTransform: "uppercase", letterSpacing: "0.5px", color: "#64748b" }}>
                                <span>Ch</span><span>Channel ID</span><span>Cell ID / Project · Group</span><span>Test</span><span>Dur.</span><span>Start</span><span></span>
                              </div>
                              {visibleShelfChannels.map((ch) => {
                                const chi = chamber.channels.indexOf(ch);
                                return (
                                  <div key={chi} style={{
                                    display: "grid", gridTemplateColumns: "40px 120px 1fr 100px 80px 100px 60px",
                                    gap: 0, padding: "6px 8px", fontSize: 12, alignItems: "center",
                                    borderBottom: "1px solid #1a1f27",
                                    background: ch.cellId ? "rgba(78,154,245,0.04)" : "transparent"
                                  }}>
                                    <span style={{ color: "#64748b", fontFamily: "'JetBrains Mono', monospace" }}>{ch.number}</span>
                                    <span style={{ color: "#8891a0", fontFamily: "'JetBrains Mono', monospace", fontSize: 11 }}>{ch.channelId}</span>
                                    <div>
                                      {ch.cellId ? (
                                        <div style={{ display: "flex", flexDirection: "column", gap: 1 }}>
                                          <span style={{ color: "#e2e6ed", fontWeight: 500 }}>{ch.cellId}</span>
                                          <InlineProjectGroupEdit
                                            project={ch.project}
                                            group={ch.analysisGroup}
                                            availableProjects={availableProjects}
                                            groupsByProject={groupsByProject}
                                            onCommit={async (nextProject, nextGroup) => {
                                              const nd = JSON.parse(JSON.stringify(data));
                                              nd.chambers[ci].channels[chi].project = nextProject;
                                              nd.chambers[ci].channels[chi].analysisGroup = nextGroup;
                                              await persist(nd);
                                            }}
                                          />
                                        </div>
                                      ) : (
                                        <span style={{ color: "#3a4250", fontSize: 11 }}>— {ch.purpose}</span>
                                      )}
                                    </div>
                                    <div style={{ minWidth: 0 }}>
                                      <span style={{ color: ch.currentTest ? "#e2e6ed" : "#3a4250", fontSize: 11 }}>{ch.currentTest || "—"}</span>
                                      {ch.filename && <div title={ch.filename} style={{ fontSize: 9, color: "#4a5260", fontFamily: "'JetBrains Mono', monospace", whiteSpace: "nowrap", overflow: "hidden", textOverflow: "ellipsis" }}>{ch.filename}</div>}
                                    </div>
                                    <span style={{ color: "#8891a0", fontFamily: "'JetBrains Mono', monospace", fontSize: 11 }}>{ch.durationWeeks ? ch.durationWeeks + "w" : "—"}</span>
                                    <span style={{ color: "#8891a0", fontSize: 11 }}>{fmtDateFull(ch.startDate)}</span>
                                    <div style={{ display: "flex", gap: 4 }}>
                                      {ch.cellId && !isAutoSyncChamber(chamber.name) && <button onClick={(e) => { e.stopPropagation(); if (confirm("Clear " + ch.cellId + " from channel " + ch.number + "?")) onQuickClear(ci, chi); }} style={{
                                        padding: "3px 7px", borderRadius: 4, border: "1px solid #3a2020", background: "transparent",
                                        color: "#f87171", cursor: "pointer", fontSize: 11, fontFamily: "inherit", lineHeight: 1
                                      }}>✕</button>}
                                      <button onClick={(e) => { e.stopPropagation(); onEditChannel(ci, chi); }} title={isAutoSyncChamber(chamber.name) ? "Edit metadata only — cell ID and test are auto-detected" : "Edit channel"} style={{
                                        padding: "3px 10px", borderRadius: 4, border: "1px solid #2a303c", background: "transparent",
                                        color: "#8891a0", cursor: "pointer", fontSize: 11, fontFamily: "inherit"
                                      }}>{isAutoSyncChamber(chamber.name) ? "Meta" : "Edit"}</button>
                                    </div>
                                  </div>
                                );
                              })}
                            </div>
                          );
                        });
                      })()}
                    </div>
                  )}
                </div>
              );
            })}
          </div>
        );
      })}
    </div>
  );
}

// ═══════════════════════════════════════════════════
// CHANNEL EDIT MODAL
// ═══════════════════════════════════════════════════
function ChannelModal({ data, chamberIdx, channelIdx, onSave, onClose }) {
  const _chamberName = data.chambers[chamberIdx].name;
  const _autoSync = isAutoSyncChamber(_chamberName);
  const ch = data.chambers[chamberIdx].channels[channelIdx];
  const chamber = data.chambers[chamberIdx];
  const [cellId, setCellId] = React.useState(ch.cellId || "");
  const [project, setProject] = React.useState(ch.project || "");
  const [group, setGroup] = React.useState(ch.analysisGroup || "");
  const [test, setTest] = React.useState(ch.currentTest || "");
  const [format, setFormat] = React.useState(ch.cellFormat || "SLP");
  const [startDate, setStartDate] = React.useState(ch.startDate || today());

  const selectedTest = data.testLibrary.find(t => t.name === test);
  const dur = selectedTest?.durationWeeks || null;

  // Build datalists from current data
  const allProjects = React.useMemo(() => {
    const s = new Set();
    data.chambers.forEach(c => c.channels.forEach(x => {
      if (x.cellId && x.project) s.add(x.project);
    }));
    return Array.from(s).sort((a, b) => a.localeCompare(b));
  }, [data]);
  const groupsForProject = React.useMemo(() => {
    if (!project) return [];
    const s = new Set();
    data.chambers.forEach(c => c.channels.forEach(x => {
      if (x.cellId && x.project === project && x.analysisGroup) s.add(x.analysisGroup);
    }));
    return Array.from(s).sort((a, b) => a.localeCompare(b));
  }, [data, project]);

  return (
    <Overlay onClose={onClose}>
      <div style={{ fontSize: 16, fontWeight: 600, marginBottom: 4 }}>{_autoSync ? "Edit Metadata · Channel " : "Edit Channel "}{ch.number}</div>
      <div style={{ fontSize: 12, color: "#8891a0", marginBottom: 16 }}>{chamber.name} ({chamber.temp}) · {ch.channelId} · {ch.purpose}</div>

      {_autoSync && (
        <div style={{
          background: "rgba(45,212,191,0.08)", border: "1px solid rgba(45,212,191,0.35)",
          borderRadius: 6, padding: "10px 14px", marginBottom: 16, fontSize: 12, lineHeight: 1.5,
          color: "#a8e6db"
        }}>
          <div style={{ fontWeight: 600, color: "#2dd4bf", marginBottom: 4 }}>⟲ Auto-synced from Neware</div>
          Cell ID, current test, and start date are detected from the running .xlsx files in the Neware data folder.
          You can edit Project, Analysis Group, Cell Format, and Duration here — those persist across watcher updates.
        </div>
      )}

      <Field label="Cell ID">
        <input value={cellId} onChange={e => setCellId(e.target.value)} placeholder="CRD_XX_CID####" disabled={_autoSync} style={{...inputStyle, opacity: _autoSync ? 0.55 : 1, cursor: _autoSync ? "not-allowed" : "text"}} />
      </Field>
      <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 10 }}>
        <Field label="Project">
          <input
            value={project}
            onChange={e => setProject(e.target.value)}
            placeholder="e.g. Anode benchmarking"
            list="modal-projects-list"
            style={inputStyle}
          />
          <datalist id="modal-projects-list">
            {allProjects.map(p => <option key={p} value={p} />)}
          </datalist>
        </Field>
        <Field label="Analysis Group">
          <input
            value={group}
            onChange={e => setGroup(e.target.value)}
            placeholder={project ? "Optional sub-group" : "(needs project first)"}
            list="modal-groups-list"
            disabled={!project.trim()}
            style={{...inputStyle, opacity: project.trim() ? 1 : 0.55, cursor: project.trim() ? "text" : "not-allowed"}}
          />
          <datalist id="modal-groups-list">
            {groupsForProject.map(g => <option key={g} value={g} />)}
          </datalist>
        </Field>
      </div>
      <Field label="Cell Format">
        <input value={format} onChange={e => setFormat(e.target.value)} placeholder="SLP" style={inputStyle} />
      </Field>
      <Field label="Test">
        <select value={test} onChange={e => setTest(e.target.value)} disabled={_autoSync} style={{...inputStyle, opacity: _autoSync ? 0.55 : 1, cursor: _autoSync ? "not-allowed" : "pointer"}}>
          <option value="">— None —</option>
          {data.testLibrary.map(t => <option key={t.name} value={t.name}>{t.display} ({t.durationWeeks}w)</option>)}
        </select>
      </Field>
      <Field label="Start Date">
        <input type="date" value={startDate} onChange={e => setStartDate(e.target.value)} disabled={_autoSync} style={{...inputStyle, opacity: _autoSync ? 0.55 : 1, cursor: _autoSync ? "not-allowed" : "text"}} />
      </Field>
      {dur && !_autoSync && <div style={{ fontSize: 12, color: "#8891a0", marginBottom: 12 }}>End date: {fmtDateFull(addDays(startDate, dur * 7))}</div>}

      <div style={{ display: "flex", gap: 8, marginTop: 16 }}>
        <button onClick={() => {
          // Group requires project; if project is cleared, drop group too.
          const projVal = project.trim() || null;
          const groupVal = projVal ? (group.trim() || null) : null;
          onSave(chamberIdx, channelIdx, _autoSync
            ? { project: projVal, analysisGroup: groupVal, cellFormat: format || null }
            : { cellId: cellId || null, project: projVal, analysisGroup: groupVal, cellFormat: format || null, currentTest: test || null, durationWeeks: dur, startDate: startDate || null });
        }} style={btnPrimary}>Save</button>
        {!_autoSync && <button onClick={() => onSave(chamberIdx, channelIdx, { cellId: null, currentTest: "CLEAR" })} style={btnDanger}>Clear Channel</button>}
        <button onClick={onClose} style={btnSecondary}>Cancel</button>
      </div>
    </Overlay>
  );
}

// ═══════════════════════════════════════════════════
// ARCHIVE TAB — lightweight ledger of every cell ever run
// ═══════════════════════════════════════════════════
function ArchiveTab({ data, onUnarchive }) {
  const [search, setSearch] = React.useState("");
  const [expanded, setExpanded] = React.useState(() => new Set());
  const folderArch = data.archive || {};        // folder sweep — all cells, finished tests
  const archived = data.archivedCells || {};     // retired calendar-life cells (full history)
  const activeRpt = new Set((data.rptCells || []).map(c => c.cellId).filter(Boolean));

  // Build the display list:
  //  - retired calendar-life cells (data.archivedCells) — full per-cycle history.
  //  - every other cell from the folder sweep (data.archive), EXCEPT cells that
  //    are still active in the planner (those live only in the RPT Planner) or
  //    already shown above as retired.
  const entries = [];
  Object.keys(archived).forEach(id => {
    const a = archived[id];
    const events = (a.events || []).filter(e => e.returned);
    entries.push({
      id, kind: "cl", events, storageTemp: a.storageTemp, archivedOn: a.archivedOn,
      lastSeen: (events.length ? events[events.length - 1].returned : a.archivedOn) || "",
    });
  });
  Object.keys(folderArch).forEach(id => {
    if (activeRpt.has(id) || archived[id]) return;
    const a = folderArch[id];
    if (!a.tests || !Object.keys(a.tests).length) return;
    entries.push({ id, kind: "test", tests: a.tests, lastSeen: a.lastSeen || "" });
  });

  const q = search.trim().toLowerCase();
  const rows = entries
    .filter(e => !q || e.id.toLowerCase().includes(q))
    .sort((a, b) => (b.lastSeen || "").localeCompare(a.lastSeen || "") || a.id.localeCompare(b.id));

  const toggle = (id) => setExpanded(prev => { const s = new Set(prev); s.has(id) ? s.delete(id) : s.add(id); return s; });

  return (
    <div>
      <div style={{ display: "flex", alignItems: "center", gap: 12, marginBottom: 14, marginTop: 14 }}>
        <input value={search} onChange={e => setSearch(e.target.value)} placeholder="Search cell ID…"
          style={{ ...inputStyle, maxWidth: 260 }} />
        <span style={{ fontSize: 11, color: "#64748b" }}>{rows.length} cell{rows.length === 1 ? "" : "s"} on record</span>
      </div>

      <div style={{ border: "1px solid #2a303c", borderRadius: 8, overflow: "hidden" }}>
        {rows.length === 0 && <div style={{ padding: 24, textAlign: "center", color: "#3a4250", fontSize: 12 }}>Nothing archived yet — finished non-calendar cells appear here automatically, and calendar-life cells once you "Move cell to archive" from the planner.</div>}
        {rows.map((e, i) => {
          const isCL = e.kind === "cl";
          const events = e.events || [];
          const last = events.length ? events[events.length - 1] : null;
          const isOpen = expanded.has(e.id);
          const expandable = isCL && events.length > 0;
          return (
            <div key={e.id} style={{ borderTop: i ? "1px solid #1a1f27" : "none", background: i % 2 ? "rgba(255,255,255,0.01)" : "transparent" }}>
              <div onClick={() => expandable && toggle(e.id)}
                style={{ display: "flex", alignItems: "center", gap: 12, padding: "8px 14px", cursor: expandable ? "pointer" : "default" }}>
                <span style={{ fontFamily: "'JetBrains Mono', monospace", fontSize: 12, fontWeight: 600, color: "#e2e6ed", minWidth: 150 }}>{e.id}</span>
                {isCL && <span style={{ fontSize: 10, padding: "1px 6px", borderRadius: 3, background: "rgba(167,139,250,0.15)", color: "#a78bfa", fontWeight: 600 }}>Calendar Life</span>}
                <div style={{ flex: 1, display: "flex", flexWrap: "wrap", gap: 6, justifyContent: "flex-end" }}>
                  {isCL
                    ? <span style={{ fontSize: 11, color: "#8891a0" }}>{events.length} RPT{events.length === 1 ? "" : "s"}{last ? " · last " + fmtDate(last.returned) : ""}{e.archivedOn ? " · archived " + fmtDate(e.archivedOn) : ""}</span>
                    : Object.entries(e.tests).map(([t, d]) => (
                        <span key={t} style={{ fontSize: 10, padding: "2px 7px", borderRadius: 3, background: "#0c0f14", color: "#8891a0", fontFamily: "'JetBrains Mono', monospace" }}>
                          {t} <span style={{ color: "#3a4250" }}>{d.first === d.last ? fmtDate(d.first) : fmtDate(d.first) + "–" + fmtDate(d.last)}</span>
                        </span>
                      ))}
                </div>
                {isCL && onUnarchive && (
                  <button
                    onClick={(ev) => { ev.stopPropagation(); if (window.confirm(`Restore ${e.id} to the planner?\n\nIt returns to calendar-life testing with its saved history and last-known storage spot.`)) onUnarchive(e.id); }}
                    title="Restore this cell to the planner"
                    style={{ padding: "2px 8px", borderRadius: 4, border: "1px solid #34d399", background: "transparent", color: "#34d399", cursor: "pointer", fontSize: 10, fontFamily: "inherit" }}>
                    ↩ Restore
                  </button>
                )}
                {expandable && <span style={{ color: "#64748b", fontSize: 10 }}>{isOpen ? "▲" : "▼"}</span>}
              </div>
              {expandable && isOpen && (
                <div style={{ padding: "0 14px 10px 14px", display: "flex", flexWrap: "wrap", gap: 6 }}>
                  {events.map((ev, j) => (
                    <span key={j} style={{ fontSize: 10, padding: "2px 7px", borderRadius: 3, background: "#0c0f14", color: "#8891a0", fontFamily: "'JetBrains Mono', monospace" }}>
                      #{j + 1} {fmtDate(ev.start)} → {fmtDate(ev.returned)}
                    </span>
                  ))}
                </div>
              )}
            </div>
          );
        })}
      </div>
    </div>
  );
}

// ═══════════════════════════════════════════════════
// RPT TAB
// ═══════════════════════════════════════════════════
function RptTab({ data, stats, onAdd, onDelete, onLogEvent, persist, tempFilter }) {
  const [rptSubTab, setRptSubTab] = React.useState("storage"); // "storage" | "cycling" | "gantt"
  const [upcomingExpanded, setUpcomingExpanded] = React.useState(false);
  const [selectedIdx, setSelectedIdx] = React.useState(null); // index into data.rptCells for the detail drawer

  // One-time auto-pack: every cell that has a storage chamber but no slot yet
  // gets dropped into the next free square of that chamber, honoring each
  // shelf's capacity. Overflow stays unplaced (user can add a shelf or move it).
  const packedRef = React.useRef(false);
  React.useEffect(() => {
    if (packedRef.current) return;
    const cells = data.rptCells || [];
    if (!cells.some(c => c.assignedStorage && c.storageSlot == null)) { packedRef.current = true; return; }
    const nd = JSON.parse(JSON.stringify(data));
    const sc = nd.storageConfig || {};
    const occ = {}; // chamber -> Set("shelf:slot")
    nd.rptCells.forEach(c => {
      if (c.assignedStorage && c.storageSlot != null)
        (occ[c.assignedStorage] = occ[c.assignedStorage] || new Set()).add((c.storageShelf || 0) + ":" + c.storageSlot);
    });
    // Fill in tidy order: day-group (ordered by its lowest cell #) then cell #,
    // so same-day cells stay contiguous and numbers ascend.
    const cellNum = (id) => { const m = (id || "").match(/CRD_(\d+)_CID(\d+)/); return m ? [+m[1], +m[2]] : [1e9, 1e9]; };
    const dayOf = (c) => { const e = lastEvent(c); return (e && e.start) || c.anchorDate || ""; };
