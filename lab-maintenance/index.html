// localStorage-based storage shim (replaces window.storage from Claude artifacts)
const localStorageShim = {
  async get(key) {
    const value = localStorage.getItem(key);
    if (value === null) throw new Error('Key not found');
    return { key, value, shared: false };
  },
  async set(key, value) {
    localStorage.setItem(key, value);
    return { key, value, shared: false };
  },
  async delete(key) {
    localStorage.removeItem(key);
    return { key, deleted: true, shared: false };
  },
};


// Lucide icon wrappers — convert vanilla lucide icon arrays into React components.
// Each icon in window.lucide is [svgTag, svgAttrs, children] where children is
// an array of [tagName, attrs] pairs.
function makeIconComponent(iconArray) {
  // iconArray = ["svg", svgAttrs, [["path", {...}], ...]]
  const children = iconArray && iconArray[2] ? iconArray[2] : [];
  return function LucideIcon({ size = 16, color = 'currentColor', strokeWidth = 2, style = {}, className = '', ...rest }) {
    return React.createElement('svg', {
      xmlns: 'http://www.w3.org/2000/svg',
      width: size, height: size,
      viewBox: '0 0 24 24',
      fill: 'none',
      stroke: color,
      strokeWidth,
      strokeLinecap: 'round',
      strokeLinejoin: 'round',
      style, className,
      ...rest,
    }, children.map(([tag, attrs], i) => {
      // Convert kebab-case attrs to camelCase for React
      const reactAttrs = { key: i };
      for (const [k, v] of Object.entries(attrs || {})) {
        if (k === 'stroke-width') reactAttrs.strokeWidth = v;
        else if (k === 'stroke-linecap') reactAttrs.strokeLinecap = v;
        else if (k === 'stroke-linejoin') reactAttrs.strokeLinejoin = v;
        else if (k === 'fill-rule') reactAttrs.fillRule = v;
        else if (k === 'clip-rule') reactAttrs.clipRule = v;
        else reactAttrs[k] = v;
      }
      return React.createElement(tag, reactAttrs);
    }));
  };
}

// ============================================================
// VIRTUAL CATEGORY DERIVATION — collect every pump-related
// attribute across the real categories. Each pump becomes a
// "box" in the virtual category, with parentCat/parentBox
// backlinks for navigation back to where it actually lives.
// ============================================================
const PUMP_TASK_TYPES = ['pump_oil', 'oil_fill', 'pump_maintenance'];

function deriveVacuumPumps() {
  // Group attributes by physical pump. Two attributes belong to the same pump
  // when they share parent (cat + box) AND the same pump role (Antechamber, Oven, etc.)
  // or the same singleton key (e.g. small_cathode's lone pump).
  const pumps = {};
  Object.entries(CATEGORIES).forEach(([catKey, cat]) => {
    if (cat.virtual) return;
    Object.entries(cat.boxes).forEach(([boxKey, box]) => {
      Object.entries(box.attributes).forEach(([attrKey, attr]) => {
        if (!PUMP_TASK_TYPES.includes(attr.type)) return;
        // Determine which physical pump this attribute belongs to.
        // For glovebox-style: attr.pump is set (e.g. "Antechamber"). For cathode ovens,
        // there's only one pump per box so we treat the box itself as the pump.
        const pumpRole = attr.pump || '';
        const pumpKey = pumpRole
          ? `${catKey}__${boxKey}__${pumpRole.toLowerCase()}`
          : `${catKey}__${boxKey}__main`;

        if (!pumps[pumpKey]) {
          const name = pumpRole && pumpRole !== box.name
            ? `${box.name} · ${pumpRole}`
            : box.name;
          pumps[pumpKey] = {
            name,
            parentCat: catKey,
            parentBox: boxKey,
            parentBoxName: box.name,
            parentCatName: cat.name,
            brand: attr.brand,
            attributes: {},
            attrKeys: [],
          };
        }
        // Add this attribute under the pump
        pumps[pumpKey].attributes[attrKey] = attr;
        pumps[pumpKey].attrKeys.push(attrKey);
        // Prefer non-empty brand value
        if (attr.brand && !pumps[pumpKey].brand) pumps[pumpKey].brand = attr.brand;
      });
    });
  });
  return pumps;
}

const today = () => new Date().toISOString().slice(0, 10);
const daysBetween = (d1, d2) => Math.floor((new Date(d2).getTime() - new Date(d1).getTime()) / 86400000);

const getStatus = (lastDate, intervalDays) => {
  if (!lastDate) return { code: 'none', label: 'No record', color: '#6b6b6b' };
  if (!intervalDays) return { code: 'tracked', label: 'Tracked', color: '#7a8a9a' };
  const days = daysBetween(lastDate, today());
  const remaining = intervalDays - days;
  if (remaining < 0) return { code: 'overdue', label: `${-remaining}d overdue`, color: '#c4524b' };
  if (remaining <= intervalDays * 0.15) return { code: 'due_soon', label: `Due in ${remaining}d`, color: '#d4a574' };
  return { code: 'ok', label: `${remaining}d remaining`, color: '#6a9a6a' };
};

const STORAGE_KEY = 'lab_maintenance_data_v18';

function LabMaintenanceDashboard() {
  const [data, setData] = useState(SEED_DATA);
  const [lens, setLens] = useState('box'); // 'box' | 'task'
  const [activeCategory, setActiveCategory] = useState('glovebox');
  const [activeBox, setActiveBox] = useState('powder');
  const [activeTaskType, setActiveTaskType] = useState('argon');
  const [activeView, setActiveView] = useState('overview');
  const [storageReady, setStorageReady] = useState(false);
  const [modalConfig, setModalConfig] = useState(null);
  const [intervals, setIntervals] = useState(DEFAULT_INTERVALS);
  const [showSettings, setShowSettings] = useState(false);
  const [expandedCategories, setExpandedCategories] = useState(new Set());

  const toggleCategory = (catKey) => {
    setExpandedCategories(prev => {
      const next = new Set(prev);
      if (next.has(catKey)) next.delete(catKey);
      else next.add(catKey);
      return next;
    });
  };

  const expandCategory = (catKey) => {
    setExpandedCategories(prev => {
      if (prev.has(catKey)) return prev;
      const next = new Set(prev);
      next.add(catKey);
      return next;
    });
  };

  useEffect(() => {
    (async () => {
      try {
        const saved = await localStorageShim.get(STORAGE_KEY);
        if (saved && saved.value) {
          const parsed = JSON.parse(saved.value);
          if (parsed.data) setData(parsed.data);
          if (parsed.intervals) setIntervals(parsed.intervals);
        }
      } catch (e) {}
      setStorageReady(true);
    })();
  }, []);

  useEffect(() => {
    if (!storageReady) return;
    (async () => {
      try {
        await localStorageShim.set(STORAGE_KEY, JSON.stringify({ data, intervals }));
      } catch (e) {}
    })();
  }, [data, intervals, storageReady]);

  const addEntry = (catKey, boxKey, attrKey, entry) => {
    const id = `${attrKey}_${Date.now()}`;
    setData(prev => ({
      ...prev,
      [catKey]: {
        ...prev[catKey],
        [boxKey]: {
          ...prev[catKey]?.[boxKey],
          [attrKey]: [...(prev[catKey]?.[boxKey]?.[attrKey] || []), { id, ...entry }],
        },
      },
    }));
  };

  const updateEntry = (catKey, boxKey, attrKey, id, entry) => {
    setData(prev => ({
      ...prev,
      [catKey]: {
        ...prev[catKey],
        [boxKey]: {
          ...prev[catKey][boxKey],
          [attrKey]: prev[catKey][boxKey][attrKey].map(e => e.id === id ? { id, ...entry } : e),
        },
      },
    }));
  };

  const deleteEntry = (catKey, boxKey, attrKey, id) => {
    setData(prev => ({
      ...prev,
      [catKey]: {
        ...prev[catKey],
        [boxKey]: {
          ...prev[catKey][boxKey],
          [attrKey]: prev[catKey][boxKey][attrKey].filter(e => e.id !== id),
        },
      },
    }));
  };

  const exportJSON = () => {
    const blob = new Blob([JSON.stringify({ data, intervals }, null, 2)], { type: 'application/json' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = `lab_maintenance_${today()}.json`;
    a.click();
    URL.revokeObjectURL(url);
  };

  const importJSON = (file) => {
    const reader = new FileReader();
    reader.onload = e => {
      try {
        const parsed = JSON.parse(e.target.result);
        if (parsed.data) setData(parsed.data);
        if (parsed.intervals) setIntervals(parsed.intervals);
      } catch (err) {
        alert('Invalid JSON file');
      }
    };
    reader.readAsText(file);
  };

  const cat = CATEGORIES[activeCategory];

  return (
    <div style={{ fontFamily: "'Inter', system-ui, sans-serif", background: '#0e1116', color: '#dcdfe4', minHeight: '100vh' }}>
      <style>{styles}</style>

      <Header onSettings={() => setShowSettings(true)} onExport={exportJSON} onImport={importJSON} />

      <GlobalAlertBar
        data={data}
        intervals={intervals}
        onNavigate={(catKey, boxKey) => {
          setLens('box');
          setActiveCategory(catKey);
          setActiveBox(boxKey);
          setActiveView('box');
          expandCategory(catKey);
        }}
      />

      <div className="layout">
        <Sidebar
          lens={lens}
          setLens={setLens}
          activeCategory={activeCategory}
          setActiveCategory={(k) => {
            setActiveCategory(k);
            const targetCat = CATEGORIES[k];
            const boxes = targetCat.virtual ? deriveVacuumPumps() : targetCat.boxes;
            const firstBox = Object.keys(boxes)[0];
            setActiveBox(firstBox);
            setActiveView('overview');
          }}
          activeBox={activeBox}
          setActiveBox={(b) => { setActiveBox(b); setActiveView('box'); }}
          activeTaskType={activeTaskType}
          setActiveTaskType={(t) => { setActiveTaskType(t); setActiveView('task'); }}
          activeView={activeView}
          setActiveView={setActiveView}
          expandedCategories={expandedCategories}
          toggleCategory={toggleCategory}
        />

        <main className="main">
          {lens === 'box' && activeView === 'overview' && (
            <CategoryOverview
              category={activeCategory}
              cat={cat}
              data={data[activeCategory] || {}}
              allData={data}
              intervals={intervals}
              onSelectBox={(b) => { setActiveBox(b); setActiveView('box'); expandCategory(activeCategory); }}
            />
          )}
          {lens === 'box' && activeView === 'box' && cat.virtual && (
            <VirtualPumpView
              pumpKey={activeBox}
              accent={cat.accent}
              allData={data}
              intervals={intervals}
              onJumpToParent={(parentCat, parentBox) => {
                setActiveCategory(parentCat);
                setActiveBox(parentBox);
                setActiveView('box');
                expandCategory(parentCat);
              }}
            />
          )}
          {lens === 'box' && activeView === 'box' && !cat.virtual && (
            <BoxView
              category={activeCategory}
              boxKey={activeBox}
              box={cat.boxes[activeBox]}
              accent={cat.accent}
              data={data[activeCategory]?.[activeBox] || {}}
              intervals={intervals}
              onLog={(attrKey) => setModalConfig({ catKey: activeCategory, boxKey: activeBox, attrKey })}
              onEdit={(attrKey, existingEntry) => setModalConfig({ catKey: activeCategory, boxKey: activeBox, attrKey, existingEntry })}
              onDelete={(attrKey, id) => deleteEntry(activeCategory, activeBox, attrKey, id)}
            />
          )}
          {lens === 'task' && activeView === 'overview' && (
            <TaskOverview
              data={data}
              intervals={intervals}
              onSelectTask={(t) => { setActiveTaskType(t); setActiveView('task'); }}
            />
          )}
          {lens === 'task' && activeView === 'task' && (
            <TaskView
              taskType={activeTaskType}
              data={data}
              intervals={intervals}
              onLog={(catKey, boxKey, attrKey) => setModalConfig({ catKey, boxKey, attrKey })}
              onEdit={(catKey, boxKey, attrKey, existingEntry) => setModalConfig({ catKey, boxKey, attrKey, existingEntry })}
              onDelete={(catKey, boxKey, attrKey, id) => deleteEntry(catKey, boxKey, attrKey, id)}
            />
          )}
        </main>
      </div>

      {modalConfig && (
        <EntryModal
          attribute={CATEGORIES[modalConfig.catKey].boxes[modalConfig.boxKey].attributes[modalConfig.attrKey]}
          boxName={CATEGORIES[modalConfig.catKey].boxes[modalConfig.boxKey].name}
          existingEntry={modalConfig.existingEntry || null}
          onSave={(entry) => {
            if (modalConfig.existingEntry) {
              updateEntry(modalConfig.catKey, modalConfig.boxKey, modalConfig.attrKey, modalConfig.existingEntry.id, entry);
            } else {
              addEntry(modalConfig.catKey, modalConfig.boxKey, modalConfig.attrKey, entry);
            }
            setModalConfig(null);
          }}
          onClose={() => setModalConfig(null)}
        />
      )}

      {showSettings && (
        <SettingsModal
          intervals={intervals}
          setIntervals={setIntervals}
          onClose={() => setShowSettings(false)}
        />
      )}
    </div>
  );
}

function GlobalAlertBar({ data, intervals, onNavigate }) {
  const [expanded, setExpanded] = useState(null);

  const items = useMemo(() => {
    const overdue = [];
    const dueSoon = [];
    Object.entries(CATEGORIES).forEach(([catKey, cat]) => {
      if (cat.virtual) return;
      Object.entries(cat.boxes).forEach(([boxKey, box]) => {
        Object.entries(box.attributes).forEach(([attrKey, attr]) => {
          const entries = data[catKey]?.[boxKey]?.[attrKey] || [];
          const last = [...entries].sort((a, b) => b.date.localeCompare(a.date))[0];
          const status = getStatus(last?.date, intervals[attr.type]);
          const item = {
            catKey, boxKey, attrKey,
            categoryName: cat.name,
            boxName: box.name,
            attrLabel: attr.label || TASK_TYPES[attr.type].label,
            brand: attr.brand,
            lastDate: last?.date,
            status,
          };
          if (status.code === 'overdue') overdue.push(item);
          else if (status.code === 'due_soon') dueSoon.push(item);
        });
      });
    });
    overdue.sort((a, b) => {
      const ad = parseInt(a.status.label) || 0;
      const bd = parseInt(b.status.label) || 0;
      return bd - ad;
    });
    dueSoon.sort((a, b) => {
      const ad = parseInt(a.status.label) || 0;
      const bd = parseInt(b.status.label) || 0;
      return ad - bd;
    });
    return { overdue, dueSoon };
  }, [data, intervals]);

  const toggle = (key) => setExpanded(expanded === key ? null : key);

  return (
    <div className="alert-bar">
      <div className="alert-bar-row">
        <button
          className={`alert-pill ${items.overdue.length > 0 ? 'has-items overdue' : 'empty'} ${expanded === 'overdue' ? 'open' : ''}`}
          onClick={() => items.overdue.length > 0 && toggle('overdue')}
          disabled={items.overdue.length === 0}
        >
          <AlertTriangle size={15} />
          <span className="alert-count">{items.overdue.length}</span>
          <span className="alert-label">Overdue</span>
          {items.overdue.length > 0 && <ChevronRight size={14} className={`alert-chev ${expanded === 'overdue' ? 'open' : ''}`} />}
        </button>

        <button
          className={`alert-pill ${items.dueSoon.length > 0 ? 'has-items due-soon' : 'empty'} ${expanded === 'due_soon' ? 'open' : ''}`}
          onClick={() => items.dueSoon.length > 0 && toggle('due_soon')}
          disabled={items.dueSoon.length === 0}
        >
          <Clock size={15} />
          <span className="alert-count">{items.dueSoon.length}</span>
          <span className="alert-label">Due Soon</span>
          {items.dueSoon.length > 0 && <ChevronRight size={14} className={`alert-chev ${expanded === 'due_soon' ? 'open' : ''}`} />}
        </button>

        {items.overdue.length === 0 && items.dueSoon.length === 0 && (
          <div className="alert-all-clear">
            <CheckCircle2 size={15} />
            <span>All maintenance on schedule</span>
          </div>
        )}
      </div>

      {expanded && (
        <div className="alert-dropdown">
          <div className="alert-dropdown-head">
            {expanded === 'overdue' ? 'OVERDUE — most overdue first' : 'DUE SOON — closest deadline first'}
            <span className="alert-dropdown-hint">Click any item to jump to it</span>
          </div>
          <div className="alert-list">
            {(expanded === 'overdue' ? items.overdue : items.dueSoon).map(item => (
              <button
                key={`${item.catKey}-${item.boxKey}-${item.attrKey}`}
                className="alert-item"
                onClick={() => {
                  onNavigate(item.catKey, item.boxKey);
                  setExpanded(null);
                }}
              >
                <div className="alert-item-left">
                  <div className="alert-item-status" style={{ background: item.status.color }} />
                  <div className="alert-item-text">
                    <div className="alert-item-primary">
                      {item.boxName} <span className="alert-item-sep">›</span> {item.attrLabel}
                      {item.brand && <span className="alert-item-brand"> · {item.brand}</span>}
                    </div>
                    <div className="alert-item-secondary">
                      {item.categoryName} · last: {item.lastDate || '—'}
                    </div>
                  </div>
                </div>
                <div className="alert-item-right">
                  <span className="alert-item-status-label" style={{ color: item.status.color }}>{item.status.label}</span>
                  <ChevronRight size={14} />
                </div>
              </button>
            ))}
          </div>
        </div>
      )}
    </div>
  );
}

function CategoryOverview({ category, cat, data, intervals, onSelectBox, allData }) {
  const boxes = cat.virtual ? deriveVacuumPumps() : cat.boxes;

  const lookupEntries = (bKey, aKey, box) => {
    if (cat.virtual) {
      return allData[box.parentCat]?.[box.parentBox]?.[aKey] || [];
    }
    return data[bKey]?.[aKey] || [];
  };

  const allStatuses = [];
  Object.entries(boxes).forEach(([bKey, box]) => {
    Object.entries(box.attributes).forEach(([aKey, attr]) => {
      const entries = lookupEntries(bKey, aKey, box);
      const last = [...entries].sort((a, b) => b.date.localeCompare(a.date))[0];
      const status = getStatus(last?.date, intervals[attr.type]);
      allStatuses.push({ status });
    });
  });

  const overdue = allStatuses.filter(s => s.status.code === 'overdue').length;
  const dueSoon = allStatuses.filter(s => s.status.code === 'due_soon').length;
  const ok = allStatuses.filter(s => s.status.code === 'ok').length;

  return (
    <div className="panel">
      <PanelHeader
        title={`${cat.name} · Overview`}
        subtitle={cat.virtual
          ? 'Aggregated view of pumps that live on other equipment — click to jump to parent for logging'
          : 'Each box shows its full maintenance picture — click any box to drill in'}
      />

      <div className="stat-row">
        <StatCard label="OVERDUE" value={overdue} color="#c4524b" icon={AlertTriangle} />
        <StatCard label="DUE SOON" value={dueSoon} color="#d4a574" icon={Clock} />
        <StatCard label="ON SCHEDULE" value={ok} color="#6a9a6a" icon={CheckCircle2} />
        <StatCard label={cat.virtual ? 'PUMPS' : 'BOXES'} value={Object.keys(boxes).length} color="#7a8a9a" icon={Activity} />
      </div>

      <div className="boxes-grid">
        {Object.entries(boxes).map(([bKey, box]) => {
          const attrStatuses = Object.entries(box.attributes).map(([aKey, attr]) => {
            const entries = lookupEntries(bKey, aKey, box);
            const last = [...entries].sort((a, b) => b.date.localeCompare(a.date))[0];
            const status = getStatus(last?.date, intervals[attr.type]);
            return { aKey, attr, last, status };
          });
          return (
            <div key={bKey} className="big-box-card" onClick={() => onSelectBox(bKey)}>
              <div className="big-box-head">
                <div>
                  <div className="big-box-name">{box.name}</div>
                  <div className="big-box-id">
                    {cat.virtual && box.brand
                      ? <>/ {box.brand}</>
                      : <>/ {bKey}</>}
                  </div>
                </div>
                <ChevronRight size={16} className="big-box-chev" />
              </div>
              <div className="attr-list">
                {attrStatuses.map(({ aKey, attr, last, status }) => (
                  <div key={aKey} className="attr-row">

function gatherTaskInstances(taskTypeKey, data) {
  const instances = [];
  Object.entries(CATEGORIES).forEach(([catKey, cat]) => {
    if (cat.virtual) return;
    Object.entries(cat.boxes).forEach(([boxKey, box]) => {
      Object.entries(box.attributes).forEach(([attrKey, attr]) => {
        if (attr.type === taskTypeKey) {
          instances.push({
            catKey, boxKey, attrKey, attr, box,
            cat,
            entries: data[catKey]?.[boxKey]?.[attrKey] || [],
          });
        }
      });
    });
  });
  return instances;
}

function TaskOverview({ data, intervals, onSelectTask }) {
  return (
    <div className="panel">
      <PanelHeader title="By Task · Overview" subtitle="Check status of every maintenance type across all equipment at once" />

      <div className="task-overview-grid">
        {Object.entries(TASK_TYPES).map(([tKey, t]) => {
          const instances = gatherTaskInstances(tKey, data);
          const statuses = instances.map(inst => {
            const last = [...inst.entries].sort((a, b) => b.date.localeCompare(a.date))[0];
            return getStatus(last?.date, intervals[tKey]);
          });
          const overdue = statuses.filter(s => s.code === 'overdue').length;
          const dueSoon = statuses.filter(s => s.code === 'due_soon').length;
          const ok = statuses.filter(s => s.code === 'ok').length;
          const noRecord = statuses.filter(s => s.code === 'none').length;

          return (
            <div key={tKey} className="task-overview-card" onClick={() => onSelectTask(tKey)}>
              <div className="task-overview-head">
                <div className="task-overview-name">{t.label}</div>
                <ChevronRight size={16} className="task-overview-chev" />
              </div>
              <div className="task-overview-meta">
                <span>{instances.length} location{instances.length === 1 ? '' : 's'}</span>
                <span>·</span>
                <span>{intervals[tKey] ? `${intervals[tKey]}d interval` : 'no interval set'}</span>
              </div>
              <div className="task-overview-stats">
                {overdue > 0 && <span className="mini-stat" style={{ color: '#c4524b' }}>{overdue} overdue</span>}
                {dueSoon > 0 && <span className="mini-stat" style={{ color: '#d4a574' }}>{dueSoon} due soon</span>}
                {ok > 0 && <span className="mini-stat" style={{ color: '#6a9a6a' }}>{ok} ok</span>}
                {noRecord > 0 && <span className="mini-stat" style={{ color: '#6b6b6b' }}>{noRecord} no record</span>}

            </div>

        })}

function TaskView({ taskType, data, intervals, onLog, onEdit, onDelete }) {
  const t = TASK_TYPES[taskType];
  const instances = gatherTaskInstances(taskType, data);
  const interval = intervals[taskType];

  const enriched = instances.map(inst => {
    const sortedEntries = [...inst.entries].sort((a, b) => b.date.localeCompare(a.date));
    const last = sortedEntries[0];
    const status = getStatus(last?.date, interval);
    return { ...inst, last, status, sortedEntries };
  }).sort((a, b) => {
    const order = { overdue: 0, due_soon: 1, ok: 2, tracked: 3, none: 4 };
    if (order[a.status.code] !== order[b.status.code]) return order[a.status.code] - order[b.status.code];
    if (!a.last) return 1;
    if (!b.last) return -1;
    return a.last.date.localeCompare(b.last.date);
  });

  return (
    <div className="panel">
      <PanelHeader title={`Task · ${t.label}`} subtitle={`Every location across all equipment · sorted by urgency · ${interval ? `${interval}d interval` : 'no interval set'}`} />

      <div className="attrib-grid">
        {enriched.map(inst => (
          <TaskInstanceCard
            key={`${inst.catKey}-${inst.boxKey}-${inst.attrKey}`}
            inst={inst}
            interval={interval}
            onLog={() => onLog(inst.catKey, inst.boxKey, inst.attrKey)}
          />
        ))}
      </div>

      <div className="logs-section">
        <div className="section-title">ENTRIES BY LOCATION</div>
        {enriched.map(inst => {
          const label = inst.attr.label || t.label;
          return (
            <div key={`${inst.catKey}-${inst.boxKey}-${inst.attrKey}`} className="log-section">
              <div className="log-section-head">
                <div className="log-title">
                  {inst.box.name} <span className="log-sep">›</span> {label}
                  <span className="log-count">{inst.sortedEntries.length}</span>
                </div>
                <button className="log-btn small" onClick={() => onLog(inst.catKey, inst.boxKey, inst.attrKey)}>
                  <Plus size={12} /> ADD ENTRY
                </button>
              </div>
              <div className="log-table-wrap">
                <table className="log-table">
                  <thead>
                    <tr>
                      {t.fields.map(f => <th key={f}>{f}</th>)}
                      <th></th>
                    </tr>
                  </thead>
                  <tbody>
                    {inst.sortedEntries.length === 0 && (
                      <tr><td colSpan={t.fields.length + 1} className="empty">No entries yet</td></tr>
                    )}
                    {inst.sortedEntries.map(e => (
                      <tr key={e.id}>
                        {t.fields.map(f => <td key={f}>{e[f] ?? ''}</td>)}
                        <td>
                          <div style={{ display: 'flex', gap: 4 }}>
                            <button className="edit-btn" onClick={() => onEdit(inst.catKey, inst.boxKey, inst.attrKey, e)}><Pencil size={12} /></button>
                            <button className="del-btn" onClick={() => onDelete(inst.catKey, inst.boxKey, inst.attrKey, e.id)}><X size={12} /></button>
                          </div>
                        </td>
                      </tr>
                    ))}
                  </tbody>
                </table>
              </div>
            </div>
          );
        })}
      </div>
    </div>
  );
}

function ArgonTrendChart({ entries, boxName, accent }) {
  const elId = `argon-${boxName.replace(/\s+/g, '-').toLowerCase()}`;

  useEffect(() => {
    const el = document.getElementById(elId);
    if (!el) return;

    const sorted = [...entries].sort((a, b) => a.date.localeCompare(b.date));

    Plotly.newPlot(el, [
      {
        x: sorted.map(e => e.date),
        y: sorted.map(() => 1),
        type: 'scatter',
        mode: 'markers',
        name: 'Cylinder swap',
        marker: { color: accent, size: 12, line: { color: '#0e1116', width: 1 } },
        text: sorted.map(e => e.notes ? `${e.date}<br>${e.notes}` : e.date),
        hovertemplate: '%{text}<extra></extra>',
      },
    ], {
      title: { text: `${boxName.toUpperCase()} · ARGON SWAPS`, font: { size: 14, color: '#dcdfe4', family: "'Inter', sans-serif" } },
      paper_bgcolor: 'transparent',
      plot_bgcolor: 'transparent',
      font: { color: '#a0a4ad', family: "'Inter', sans-serif", size: 12 },
      xaxis: { gridcolor: '#1e242d', linecolor: '#2a3340', type: 'date' },
      yaxis: { showgrid: false, showticklabels: false, zeroline: false, range: [0, 2] },
      margin: { t: 40, r: 20, b: 50, l: 30 },
      showlegend: false,
      hovermode: 'closest',
    }, { displayModeBar: false, responsive: true });
  }, [entries, accent, boxName, elId]);

  return (
    <div className="chart-card-full">
      <div id={elId} style={{ height: 200 }} />
    </div>
  );
}

function EntryModal({ attribute, boxName, existingEntry, onSave, onClose }) {
  const taskType = TASK_TYPES[attribute.type];
  const nowTime = () => {
    const d = new Date();
    return `${String(d.getHours()).padStart(2,'0')}:${String(d.getMinutes()).padStart(2,'0')}`;
  };
  const [form, setForm] = useState(() => {
    if (existingEntry) {
      const init = {};
      taskType.fields.forEach(f => init[f] = existingEntry[f] ?? '');
      return init;
    }
    const init = {};
    taskType.fields.forEach(f => {
      if (f === 'date') init[f] = today();
      else if (f === 'time') init[f] = nowTime();
      else init[f] = '';
    });
    return init;
  });

  const set = (f, v) => setForm(p => ({ ...p, [f]: v }));

  const handleSave = () => {
    if (!form.date) { alert('Date is required'); return; }
    const cleaned = { ...form };
    if (cleaned.startPSI === '') cleaned.startPSI = null;
    else if (cleaned.startPSI != null) cleaned.startPSI = Number(cleaned.startPSI);
    if (cleaned.remainPSI === '') cleaned.remainPSI = null;
    else if (cleaned.remainPSI != null) cleaned.remainPSI = Number(cleaned.remainPSI);
    onSave(cleaned);
  };

  return (
    <div className="modal-backdrop" onClick={onClose}>
      <div className="modal" onClick={e => e.stopPropagation()}>
        <div className="modal-head">
          <div>
            <div className="modal-title">{existingEntry ? 'EDIT ENTRY' : 'LOG ENTRY'}</div>
            <div className="modal-sub">{boxName} → {attribute.label || taskType.label}</div>
          </div>
          <button className="icon-btn" onClick={onClose}><X size={14} /></button>
        </div>
        <div className="modal-body">
          {taskType.fields.map(f => (
            <div key={f} className="form-row">
              <label>{f}</label>
              {f === 'date' && <input type="date" value={form[f]} onChange={e => set(f, e.target.value)} />}
              {f === 'time' && <input type="time" value={form[f]} onChange={e => set(f, e.target.value)} />}
              {(f === 'startPSI' || f === 'remainPSI') && (
                <input type="number" value={form[f] ?? ''} onChange={e => set(f, e.target.value)} placeholder="PSI" />
              )}
              {f === 'notes' && <textarea value={form[f]} onChange={e => set(f, e.target.value)} rows={2} />}
            </div>
          ))}
        </div>
        <div className="modal-foot">
          <button className="btn ghost" onClick={onClose}>Cancel</button>
          <button className="btn primary" onClick={handleSave}>Save Entry</button>
        </div>
      </div>
    </div>
  );
}
